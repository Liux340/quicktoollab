<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮助文章 · QuickToolLab</title>
    <script>
        (function(){
            var t=localStorage.getItem('pc_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
            var l=localStorage.getItem('pc_lang')||(navigator.language.startsWith('ja')?'ja':navigator.language.startsWith('zh')?'zh':'en');
            document.documentElement.setAttribute('data-theme',t);
            document.documentElement.lang=l;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/common.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8586931911554867" crossorigin="anonymous"></script>

    <style>
        .nav{max-width:1040px;margin:0 auto;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px}
        .left{display:flex;gap:8px;align-items:center}
        .logo{text-decoration:none;color:var(--text);font-weight:700}
        .link{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:8px}
        .link:hover{background:var(--surface2);color:var(--text)}

        main{max-width:860px;margin:0 auto;padding:34px 20px 90px}
        .crumb{font-size:12px;color:var(--muted);margin-bottom:16px}
        .crumb a{color:var(--muted);text-decoration:none}
        .crumb a:hover{color:var(--text)}
        .cat{display:inline-block;margin-bottom:10px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent2)}
        h1{font-size:32px;line-height:1.3;margin-bottom:20px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
        .line{font-size:15px;color:var(--muted);margin-bottom:12px}
        .line b{color:var(--accent2)}
        .empty{padding:18px;border:1px solid var(--border);background:var(--surface);border-radius:12px;color:var(--muted)}
    </style>
    <link rel="canonical" href="https://quicktoollab.top/help-article.html">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://quicktoollab.top/help-article.html">
    <meta property="og:title" content="帮助文章 · QuickToolLab">
    <meta property="og:description" content="QuickToolLab 帮助文章">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="帮助文章 · QuickToolLab">
    <meta name="twitter:description" content="QuickToolLab 帮助文章">
</head>
<body>
<header>
    <div class="nav">
        <div class="left">
            <a class="logo" href="/">QuickToolLab</a>
            <a class="link" href="/help.html" data-i18n="back">返回帮助中心</a>
        </div>
        <div style="display:flex;align-items:center">
            <div class="lang-sw">
                <button type="button" class="lang-btn" data-lang="zh">中文</button>
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ja">日本語</button>
            </div>
            <button type="button" class="theme-btn" id="theme-btn" aria-label="Theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="crumb"><a href="/">首页</a> / <a href="/help.html" data-i18n="help">帮助中心</a> / <span data-i18n="article">文章</span></div>
    <div id="article-host"></div>
</main>

<script src="/scripts/i18n.js"></script>
<script src="/scripts/common.js"></script>
<script>
/* ── Page-specific i18n keys ── */
const PAGE_I18N = {
    zh:{ back:'返回帮助中心', help:'帮助中心', article:'文章', intro:'介绍：', howto:'用法：', science:'科普：', notfound:'没有找到该文章，请返回帮助中心重新选择。', page_title:'帮助文章 · QuickToolLab' },
    en:{ back:'Back to Help', help:'Help', article:'Article', intro:'Intro: ', howto:'How to use: ', science:'Concept: ', notfound:'Article not found. Please go back to the help center.', page_title:'Help Article · QuickToolLab' },
    ja:{ back:'ヘルプへ戻る', help:'ヘルプ', article:'記事', intro:'紹介：', howto:'使い方：', science:'豆知識：', notfound:'記事が見つかりません。ヘルプセンターから選び直してください。', page_title:'ヘルプ記事 · QuickToolLab' }
};

let ARTICLES = [];

function getPageStrings() { return { ...I18N[lang], ...PAGE_I18N[lang] }; }

function getId(){ return new URLSearchParams(location.search).get('id') || ''; }
function localizeField(v){
    if (v == null) return '';
    if (typeof v === 'string') return v;
    return v[lang] || v.zh || v.en || v.ja || '';
}

async function loadData() {
    try {
        const res = await fetch('/content/help/index.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        ARTICLES = Array.isArray(data) ? data : [];
    } catch (err) {
        ARTICLES = [];
        console.error('Failed to load help article data:', err);
    }
}

function renderArticle(){
    const t = getPageStrings();
    const id = getId();
    const a = ARTICLES.find(x => x.id === id);
    const host = document.getElementById('article-host');
    document.title = t.page_title;
    if (!a) {
        host.innerHTML = '<div class="empty">' + escapeHtml(t.notfound) + '</div>';
        return;
    }
    document.title = localizeField(a.title) + ' · QuickToolLab';
    host.innerHTML = `
        <div class="cat">${escapeHtml(localizeField(a.cat))}</div>
        <h1>${escapeHtml(localizeField(a.title))}</h1>
        <div class="card">
            <p class="line"><b>${escapeHtml(t.intro)}</b>${escapeHtml(localizeField(a.intro))}</p>
            <p class="line"><b>${escapeHtml(t.howto)}</b>${escapeHtml(localizeField(a.howto))}</p>
            <p class="line"><b>${escapeHtml(t.science)}</b>${escapeHtml(localizeField(a.science))}</p>
        </div>`;
}

function applyPageI18n() {
    const t = getPageStrings();
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (t[k] != null) el.textContent = t[k];
    });
}

function onLangChange() {
    applyPageI18n();
    renderArticle();
}

document.addEventListener('DOMContentLoaded', () => {
    loadData().then(() => {
        applyPageI18n();
        renderArticle();
    });
});
</script>
</body>
</html>
