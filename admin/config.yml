backend:
  name: github
  repo: Liux340/quicktoollab
  branch: main
  base_url: https://netlify-cms-github-oauth-provider-kappa.vercel.app/
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: zh

collections:
  - name: "blog"
    label: "博客文章"
    label_singular: "博客文章"
    folder: "content/blog"
    create: true
    delete: true
    identifier_field: "id"
    extension: "json"
    format: "json"
    slug: "{{fields.id}}"
    summary: "{{fields.id}}"
    editor:
      preview: false
    fields:
      - label: "文章 ID"
        name: "id"
        widget: "string"
        hint: "英文小写，建议使用连字符，例如 my-new-post"

      - label: "分类"
        name: "cat"
        widget: "select"
        options:
          - { label: "技术", value: "tech" }
          - { label: "工具", value: "tool" }
          - { label: "开发", value: "dev" }
          - { label: "生活", value: "life" }

      - label: "发布日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "预计阅读时间（分钟）"
        name: "readTime"
        widget: "number"
        default: 5
        min: 1
        max: 60

      - label: "标题"
        name: "title"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "string" }
          - { label: "English", name: "en", widget: "string", required: false }
          - { label: "日本語", name: "ja", widget: "string", required: false }

      - label: "摘要"
        name: "desc"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text", required: false }
          - { label: "日本語", name: "ja", widget: "text", required: false }

      - label: "正文（支持 HTML 或 Markdown 字符串）"
        name: "content"
        widget: "object"
        required: false
        fields:
          - { label: "中文正文", name: "zh", widget: "text", required: false }
          - { label: "English body", name: "en", widget: "text", required: false }
          - { label: "日本語本文", name: "ja", widget: "text", required: false }

      - label: "封面图片 URL"
        name: "image"
        widget: "string"
        required: false

      - label: "标签"
        name: "tags"
        widget: "list"
        default: []

      - label: "徽章样式"
        name: "badge"
        widget: "select"
        options:
          - { label: "tech", value: "tech" }
          - { label: "tool", value: "tool" }
          - { label: "dev", value: "dev" }
          - { label: "life", value: "life" }

  - name: "help"
    label: "帮助文章"
    label_singular: "帮助文章"
    folder: "content/help"
    create: true
    delete: true
    identifier_field: "id"
    extension: "json"
    format: "json"
    slug: "{{fields.id}}"
    summary: "{{fields.id}}"
    editor:
      preview: false
    fields:
      - label: "文章 ID"
        name: "id"
        widget: "string"
        hint: "英文小写，建议使用连字符，例如 compress-guide"

      - label: "分类名称"
        name: "cat"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "string" }
          - { label: "English", name: "en", widget: "string", required: false }
          - { label: "日本語", name: "ja", widget: "string", required: false }

      - label: "标题"
        name: "title"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "string" }
          - { label: "English", name: "en", widget: "string", required: false }
          - { label: "日本語", name: "ja", widget: "string", required: false }

      - label: "介绍"
        name: "intro"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text", required: false }
          - { label: "日本語", name: "ja", widget: "text", required: false }

      - label: "用法"
        name: "howto"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text", required: false }
          - { label: "日本語", name: "ja", widget: "text", required: false }

      - label: "原理 / 科普"
        name: "science"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text", required: false }
          - { label: "日本語", name: "ja", widget: "text", required: false }
