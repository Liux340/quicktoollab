backend:
  name: github
  repo: Liux340/quicktoollab
  branch: main

  base_url: https://netlify-cms-github-oauth-provider-kappa.vercel.app/
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: zh

collections:

  # ── 博客（改成 folder 模式）──────────────────────────────
  - name: "blog"
    label: "📝 博客文章"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"

    fields:
      - { label: "ID", name: "id", widget: "string" }

      - label: "分类"
        name: "cat"
        widget: "select"
        options:
          - { label: "技术 tech", value: "tech" }
          - { label: "工具 tool", value: "tool" }
          - { label: "开发 dev",  value: "dev"  }
          - { label: "生活 life", value: "life" }

      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }

      - { label: "阅读时间", name: "readTime", widget: "number", default: 5 }

      - label: "标题"
        name: "title"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
          - { label: "日本語", name: "ja", widget: "string" }

      - label: "摘要"
        name: "desc"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
          - { label: "日本語", name: "ja", widget: "text" }

      - label: "正文"
        name: "body"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "markdown" }
          - { label: "English", name: "en", widget: "markdown" }
          - { label: "日本語", name: "ja", widget: "markdown" }

      - { label: "封面图", name: "image", widget: "string", required: false }

      - { label: "标签", name: "tags", widget: "list", default: [] }


  # ── 帮助中心（改成 folder 模式）────────────────────────────
  - name: "help"
    label: "🛟 帮助中心"
    folder: "content/help"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"

    fields:
      - { label: "ID", name: "id", widget: "string" }

      - label: "分类"
        name: "cat"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
          - { label: "日本語", name: "ja", widget: "string" }

      - label: "标题"
        name: "title"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
          - { label: "日本語", name: "ja", widget: "string" }

      - label: "介绍"
        name: "intro"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
          - { label: "日本語", name: "ja", widget: "text" }

      - label: "用法"
        name: "howto"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
          - { label: "日本語", name: "ja", widget: "text" }

      - label: "科普"
        name: "science"
        widget: "object"
        fields:
          - { label: "中文", name: "zh", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
          - { label: "日本語", name: "ja", widget: "text" }
