<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f7fb" />
  <title>QuickToolLab 内容管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --admin-bg: #f5f7fb;
      --admin-surface: #ffffff;
      --admin-surface-soft: #f8fafc;
      --admin-border: #dbe3ee;
      --admin-text: #152033;
      --admin-muted: #5f6f86;
      --admin-accent: #2563eb;
      --admin-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      --admin-radius: 16px;
      --admin-radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", sans-serif;
      color: var(--admin-text);
      background: linear-gradient(180deg, #f8fafd 0%, #f3f6fb 100%);
    }

    #admin-brand {
      position: fixed;
      top: 16px;
      left: 18px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--admin-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--admin-shadow);
      user-select: none;
    }

    #admin-brand-badge {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--admin-accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    #admin-brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    #admin-brand-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #admin-brand-subtitle {
      font-size: 11px;
      color: var(--admin-muted);
    }

    #nc-root,
    #nc-root button,
    #nc-root input,
    #nc-root select,
    #nc-root textarea {
      font-family: inherit;
    }

    #nc-root main {
      background: transparent !important;
    }

    #nc-root [class*="AppHeader"],
    #nc-root [class*="ToolbarContainer"],
    #nc-root [class*="TopBarContainer"] {
      background: rgba(255, 255, 255, 0.96) !important;
      border-bottom: 1px solid var(--admin-border) !important;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.03);
    }

    #nc-root [class*="CollectionContainer"],
    #nc-root [class*="EditorContainer"],
    #nc-root [class*="PaneContainer"],
    #nc-root [class*="LoginContainer"] {
      background: transparent !important;
    }

    #nc-root [class*="Card"],
    #nc-root [class*="ListCard"] {
      background: var(--admin-surface) !important;
      border: 1px solid var(--admin-border) !important;
      border-radius: var(--admin-radius) !important;
      box-shadow: var(--admin-shadow);
    }

    #nc-root [class*="ListCard"]:hover,
    #nc-root [class*="Card"]:hover {
      border-color: #c9d6e6 !important;
    }

    #nc-root input:not([type="checkbox"]):not([type="radio"]),
    #nc-root select,
    #nc-root textarea {
      background: var(--admin-surface) !important;
      border: 1px solid var(--admin-border) !important;
      border-radius: var(--admin-radius-sm) !important;
      color: var(--admin-text) !important;
    }

    #nc-root input:focus,
    #nc-root select:focus,
    #nc-root textarea:focus {
      outline: none !important;
      border-color: var(--admin-accent) !important;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12) !important;
    }

    #nc-root button,
    #nc-root [role="button"],
    #nc-root .cms-button,
    #nc-root input[type="submit"] {
      border-radius: 999px !important;
    }

    #nc-root [class*="LoginContainer"] {
      border: 1px solid var(--admin-border) !important;
      border-radius: 18px !important;
      background: var(--admin-surface) !important;
      box-shadow: var(--admin-shadow);
    }

    @media (max-width: 900px) {
      #admin-brand {
        top: 12px;
        left: 12px;
        padding: 8px 12px;
      }

      #admin-brand-subtitle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="admin-brand" aria-hidden="true">
    <span id="admin-brand-badge">Q</span>
    <span id="admin-brand-text">
      <span id="admin-brand-title">QuickToolLab</span>
      <span id="admin-brand-subtitle">CMS Dashboard</span>
    </span>
  </div>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    window.CMS.init();
  </script>
</body>
</html>
