<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b8d7ff" />
  <title>QuickToolLab 内容管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --admin-text: #0a1730;
      --admin-muted: #334e78;
      --admin-accent: #2f7cf6;
      --admin-accent-strong: #195fdd;
      --admin-panel: rgba(255, 255, 255, 0.34);
      --admin-panel-strong: rgba(255, 255, 255, 0.5);
      --admin-line: rgba(255, 255, 255, 0.46);
      --admin-line-strong: rgba(255, 255, 255, 0.62);
      --admin-shadow: 0 18px 60px rgba(20, 44, 90, 0.16);
      --admin-radius: 24px;
      --admin-radius-sm: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      color: var(--admin-text);
      background:
        radial-gradient(circle at 12% 18%, rgba(140, 196, 255, 0.52), transparent 24%),
        radial-gradient(circle at 86% 12%, rgba(210, 170, 255, 0.38), transparent 22%),
        radial-gradient(circle at 54% 100%, rgba(122, 243, 222, 0.3), transparent 26%),
        linear-gradient(135deg, #b8d7ff 0%, #d9cbff 46%, #c9f7ef 100%);
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(18px);
    }

    body::before {
      top: 46px;
      right: -40px;
      width: 340px;
      height: 340px;
      background: rgba(255, 255, 255, 0.2);
    }

    body::after {
      left: -60px;
      bottom: 20px;
      width: 360px;
      height: 360px;
      background: rgba(122, 243, 222, 0.16);
    }

    #admin-brand {
      position: fixed;
      top: 22px;
      left: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(20px) saturate(140%);
      box-shadow: 0 12px 34px rgba(27, 60, 118, 0.14);
      user-select: none;
    }

    #admin-brand-badge {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(47, 124, 246, 0.94) 0%, rgba(138, 93, 255, 0.94) 100%);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 10px 24px rgba(47, 124, 246, 0.22);
    }

    #admin-brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    #admin-brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #admin-brand-subtitle {
      font-size: 12px;
      color: var(--admin-muted);
    }

    #nc-root {
      position: relative;
      z-index: 1;
    }

    #nc-root a,
    #nc-root button,
    #nc-root input,
    #nc-root select,
    #nc-root textarea {
      font-family: inherit;
    }

    #nc-root button,
    #nc-root [role="button"],
    #nc-root .cms-button,
    #nc-root input[type="submit"] {
      border-radius: 999px !important;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      box-shadow: 0 10px 24px rgba(47, 124, 246, 0.16);
    }

    #nc-root button:hover,
    #nc-root [role="button"]:hover,
    #nc-root .cms-button:hover,
    #nc-root input[type="submit"]:hover {
      transform: translateY(-1px);
    }

    #nc-root input:not([type="checkbox"]):not([type="radio"]),
    #nc-root select,
    #nc-root textarea {
      border: 1px solid var(--admin-line) !important;
      border-radius: var(--admin-radius-sm) !important;
      background: rgba(255, 255, 255, 0.58) !important;
      backdrop-filter: blur(18px) saturate(140%);
      color: var(--admin-text) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    #nc-root textarea {
      min-height: 120px;
    }

    #nc-root input:focus,
    #nc-root select:focus,
    #nc-root textarea:focus {
      outline: none !important;
      border-color: rgba(47, 124, 246, 0.48) !important;
      box-shadow: 0 0 0 4px rgba(47, 124, 246, 0.12) !important;
    }

    #nc-root aside,
    #nc-root nav,
    #nc-root main,
    #nc-root section,
    #nc-root article {
      border-color: var(--admin-line);
    }

    #nc-root aside {
      background: rgba(10, 25, 55, 0.58) !important;
      color: #f7fbff !important;
      backdrop-filter: blur(24px) saturate(140%);
      border-right: 1px solid rgba(255, 255, 255, 0.18) !important;
      box-shadow: 18px 0 40px rgba(19, 38, 74, 0.12);
    }

    #nc-root aside a,
    #nc-root aside button,
    #nc-root aside span,
    #nc-root aside div {
      color: inherit;
    }

    #nc-root main {
      background: transparent !important;
    }

    #nc-root main > div,
    #nc-root main section,
    #nc-root main article {
      border-radius: var(--admin-radius);
    }

    #nc-root [class*="AppHeader"],
    #nc-root [class*="ToolbarContainer"],
    #nc-root [class*="CollectionTopContainer"] {
      background: rgba(255, 255, 255, 0.4) !important;
      backdrop-filter: blur(22px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.28) !important;
      box-shadow: var(--admin-shadow);
    }

    #nc-root [class*="EditorContainer"],
    #nc-root [class*="PaneContainer"],
    #nc-root [class*="Card"],
    #nc-root [class*="ListCard"],
    #nc-root [class*="EditorPane"],
    #nc-root [class*="CollectionContainer"],
    #nc-root [class*="LoginContainer"],
    #nc-root [class*="ObjectControl"],
    #nc-root [class*="ListControl"],
    #nc-root [class*="TopBarContainer"] {
      background: var(--admin-panel) !important;
      border: 1px solid rgba(255, 255, 255, 0.24) !important;
      backdrop-filter: blur(24px) saturate(140%);
      box-shadow: var(--admin-shadow);
      border-radius: var(--admin-radius) !important;
    }

    #nc-root [class*="Card"],
    #nc-root [class*="ListCard"] {
      background: var(--admin-panel-strong) !important;
    }

    #nc-root [class*="ListCard"]:hover,
    #nc-root [class*="Card"]:hover {
      border-color: rgba(255, 255, 255, 0.42) !important;
      transform: translateY(-2px);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    #nc-root [class*="LoginContainer"] {
      overflow: hidden;
      position: relative;
    }

    #nc-root [class*="LoginContainer"]::before {
      content: "QuickToolLab CMS";
      display: block;
      padding: 20px 24px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #08162d;
    }

    #nc-root [class*="LoginContainer"]::after {
      content: "管理博客与帮助内容";
      display: block;
      padding: 4px 24px 8px;
      color: var(--admin-muted);
      font-size: 14px;
    }

    #nc-root [class*="EditorHeader"],
    #nc-root h1,
    #nc-root h2,
    #nc-root h3,
    #nc-root h4 {
      color: var(--admin-text) !important;
      letter-spacing: -0.02em;
    }

    #nc-root label,
    #nc-root small,
    #nc-root p {
      color: var(--admin-muted);
    }

    #nc-root strong,
    #nc-root span,
    #nc-root div,
    #nc-root li {
      color: inherit;
    }

    #nc-root aside small,
    #nc-root aside p,
    #nc-root aside label,
    #nc-root aside li,
    #nc-root aside span,
    #nc-root aside div {
      color: #eef5ff !important;
    }

    #nc-root input::placeholder,
    #nc-root textarea::placeholder {
      color: rgba(51, 78, 120, 0.78) !important;
    }

    #nc-root [aria-selected="true"],
    #nc-root [data-selected="true"] {
      color: #08162d !important;
    }

    #nc-root [data-slate-editor="true"] {
      background: rgba(255, 255, 255, 0.18) !important;
      backdrop-filter: blur(18px) saturate(140%);
      border-radius: var(--admin-radius-sm) !important;
    }

    @media (max-width: 900px) {
      #admin-brand {
        top: 12px;
        left: 12px;
        padding: 8px 12px;
      }

      #admin-brand-subtitle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="admin-brand" aria-hidden="true">
    <span id="admin-brand-badge">Q</span>
    <span id="admin-brand-text">
      <span id="admin-brand-title">QuickToolLab</span>
      <span id="admin-brand-subtitle">Glass CMS</span>
    </span>
  </div>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    window.CMS.init();
  </script>
</body>
</html>
