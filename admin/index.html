<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d9e9ff" />
  <title>QuickToolLab 内容管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --admin-text: #10203e;
      --admin-muted: #516786;
      --admin-accent: #2f7cf6;
      --admin-accent-soft: rgba(47, 124, 246, 0.12);
      --admin-panel: rgba(255, 255, 255, 0.56);
      --admin-panel-strong: rgba(255, 255, 255, 0.74);
      --admin-line: rgba(255, 255, 255, 0.5);
      --admin-shadow: 0 18px 48px rgba(22, 47, 93, 0.12);
      --admin-radius: 22px;
      --admin-radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      color: var(--admin-text);
      background:
        radial-gradient(circle at 12% 18%, rgba(138, 197, 255, 0.5), transparent 24%),
        radial-gradient(circle at 86% 12%, rgba(213, 175, 255, 0.34), transparent 22%),
        radial-gradient(circle at 54% 100%, rgba(122, 243, 222, 0.26), transparent 26%),
        linear-gradient(135deg, #d7e7ff 0%, #e5d9ff 48%, #d8f8f1 100%);
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(18px);
    }

    body::before {
      top: 42px;
      right: -30px;
      width: 320px;
      height: 320px;
      background: rgba(255, 255, 255, 0.2);
    }

    body::after {
      left: -70px;
      bottom: 10px;
      width: 360px;
      height: 360px;
      background: rgba(122, 243, 222, 0.14);
    }

    #admin-brand {
      position: fixed;
      top: 20px;
      left: 22px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.44);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(18px) saturate(140%);
      box-shadow: 0 10px 30px rgba(28, 58, 111, 0.1);
      user-select: none;
    }

    #admin-brand-badge {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(47, 124, 246, 0.94) 0%, rgba(137, 92, 255, 0.94) 100%);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 10px 20px rgba(47, 124, 246, 0.2);
    }

    #admin-brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    #admin-brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #admin-brand-subtitle {
      font-size: 12px;
      color: var(--admin-muted);
    }

    #nc-root {
      position: relative;
      z-index: 1;
    }

    #nc-root,
    #nc-root button,
    #nc-root input,
    #nc-root select,
    #nc-root textarea {
      font-family: inherit;
    }

    #nc-root button,
    #nc-root [role="button"],
    #nc-root .cms-button,
    #nc-root input[type="submit"] {
      border-radius: 999px !important;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    #nc-root button:hover,
    #nc-root [role="button"]:hover,
    #nc-root .cms-button:hover,
    #nc-root input[type="submit"]:hover {
      transform: translateY(-1px);
    }

    #nc-root input:not([type="checkbox"]):not([type="radio"]),
    #nc-root select,
    #nc-root textarea {
      border-radius: var(--admin-radius-sm) !important;
      background: rgba(255, 255, 255, 0.82) !important;
      color: var(--admin-text) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    #nc-root input:focus,
    #nc-root select:focus,
    #nc-root textarea:focus {
      outline: none !important;
      box-shadow: 0 0 0 4px rgba(47, 124, 246, 0.12) !important;
    }

    #nc-root aside {
      background: rgba(14, 30, 64, 0.8) !important;
      backdrop-filter: blur(22px) saturate(140%);
      box-shadow: 18px 0 42px rgba(18, 37, 73, 0.12);
    }

    #nc-root main {
      background: transparent !important;
    }

    #nc-root [class*="AppHeader"],
    #nc-root [class*="ToolbarContainer"],
    #nc-root [class*="CollectionTopContainer"],
    #nc-root [class*="TopBarContainer"] {
      background: rgba(255, 255, 255, 0.42) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--admin-shadow);
    }

    #nc-root [class*="EditorContainer"],
    #nc-root [class*="PaneContainer"],
    #nc-root [class*="CollectionContainer"],
    #nc-root [class*="LoginContainer"] {
      background: rgba(255, 255, 255, 0.38) !important;
      border: 1px solid rgba(255, 255, 255, 0.28) !important;
      border-radius: var(--admin-radius) !important;
      backdrop-filter: blur(20px) saturate(140%);
      box-shadow: var(--admin-shadow);
    }

    #nc-root [class*="Card"],
    #nc-root [class*="ListCard"] {
      background: rgba(255, 255, 255, 0.78) !important;
      border-radius: 18px !important;
      box-shadow: 0 10px 26px rgba(18, 37, 73, 0.06);
    }

    #nc-root [class*="ListCard"]:hover,
    #nc-root [class*="Card"]:hover {
      box-shadow: 0 14px 30px rgba(18, 37, 73, 0.08);
    }

    #nc-root [class*="LoginContainer"] {
      overflow: hidden;
      position: relative;
    }

    #nc-root [class*="LoginContainer"]::before {
      content: "QuickToolLab CMS";
      display: block;
      padding: 20px 24px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--admin-text);
    }

    #nc-root [class*="LoginContainer"]::after {
      content: "管理博客与帮助内容";
      display: block;
      padding: 4px 24px 8px;
      color: var(--admin-muted);
      font-size: 14px;
    }

    #nc-root [data-slate-editor="true"] {
      background: rgba(255, 255, 255, 0.74) !important;
      border-radius: var(--admin-radius-sm) !important;
    }

    @media (max-width: 900px) {
      #admin-brand {
        top: 12px;
        left: 12px;
        padding: 8px 12px;
      }

      #admin-brand-subtitle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="admin-brand" aria-hidden="true">
    <span id="admin-brand-badge">Q</span>
    <span id="admin-brand-text">
      <span id="admin-brand-title">QuickToolLab</span>
      <span id="admin-brand-subtitle">CMS Dashboard</span>
    </span>
  </div>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    window.CMS.init();
  </script>
</body>
</html>
