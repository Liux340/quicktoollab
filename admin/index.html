<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5efe3" />
  <title>QuickToolLab 内容管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --admin-bg: #f5efe3;
      --admin-bg-soft: #f9f4eb;
      --admin-panel: rgba(255, 252, 246, 0.9);
      --admin-panel-strong: #fffdf8;
      --admin-line: rgba(79, 58, 43, 0.14);
      --admin-line-strong: rgba(79, 58, 43, 0.22);
      --admin-text: #2f241c;
      --admin-muted: #766253;
      --admin-accent: #c96b2c;
      --admin-accent-strong: #ab541b;
      --admin-shadow: 0 18px 50px rgba(91, 69, 45, 0.12);
      --admin-radius: 22px;
      --admin-radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      color: var(--admin-text);
      background:
        radial-gradient(circle at top left, rgba(201, 107, 44, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(57, 129, 117, 0.14), transparent 22%),
        linear-gradient(180deg, #fbf7f0 0%, #f3eadc 100%);
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(8px);
    }

    body::before {
      top: 72px;
      right: -80px;
      width: 280px;
      height: 280px;
      background: rgba(201, 107, 44, 0.12);
    }

    body::after {
      left: -100px;
      bottom: 40px;
      width: 320px;
      height: 320px;
      background: rgba(57, 129, 117, 0.1);
    }

    #admin-brand {
      position: fixed;
      top: 22px;
      left: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      background: rgba(255, 250, 244, 0.72);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 30px rgba(95, 76, 52, 0.1);
      user-select: none;
    }

    #admin-brand-badge {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #d47737 0%, #bc5320 100%);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    #admin-brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    #admin-brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #admin-brand-subtitle {
      font-size: 12px;
      color: var(--admin-muted);
    }

    #nc-root {
      position: relative;
      z-index: 1;
    }

    #nc-root a,
    #nc-root button,
    #nc-root input,
    #nc-root select,
    #nc-root textarea {
      font-family: inherit;
    }

    #nc-root button,
    #nc-root [role="button"],
    #nc-root .cms-button,
    #nc-root input[type="submit"] {
      border-radius: 999px !important;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      box-shadow: 0 8px 22px rgba(201, 107, 44, 0.14);
    }

    #nc-root button:hover,
    #nc-root [role="button"]:hover,
    #nc-root .cms-button:hover,
    #nc-root input[type="submit"]:hover {
      transform: translateY(-1px);
    }

    #nc-root input:not([type="checkbox"]):not([type="radio"]),
    #nc-root select,
    #nc-root textarea {
      border: 1px solid var(--admin-line) !important;
      border-radius: var(--admin-radius-sm) !important;
      background: rgba(255, 253, 248, 0.96) !important;
      color: var(--admin-text) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
    }

    #nc-root textarea {
      min-height: 120px;
    }

    #nc-root input:focus,
    #nc-root select:focus,
    #nc-root textarea:focus {
      outline: none !important;
      border-color: rgba(201, 107, 44, 0.52) !important;
      box-shadow: 0 0 0 4px rgba(201, 107, 44, 0.12) !important;
    }

    #nc-root aside,
    #nc-root nav,
    #nc-root main,
    #nc-root section,
    #nc-root article {
      border-color: var(--admin-line);
    }

    #nc-root aside {
      background: linear-gradient(180deg, rgba(58, 42, 32, 0.94) 0%, rgba(40, 31, 24, 0.94) 100%) !important;
      color: #f7efe4 !important;
      box-shadow: 18px 0 40px rgba(53, 38, 27, 0.12);
    }

    #nc-root aside a,
    #nc-root aside button,
    #nc-root aside span,
    #nc-root aside div {
      color: inherit;
    }

    #nc-root main {
      background: transparent !important;
    }

    #nc-root main > div,
    #nc-root main section,
    #nc-root main article {
      border-radius: var(--admin-radius);
    }

    #nc-root [class*="AppHeader"],
    #nc-root [class*="ToolbarContainer"],
    #nc-root [class*="CollectionTopContainer"] {
      background: rgba(255, 251, 245, 0.7) !important;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(101, 76, 56, 0.08) !important;
      box-shadow: var(--admin-shadow);
    }

    #nc-root [class*="EditorContainer"],
    #nc-root [class*="PaneContainer"],
    #nc-root [class*="Card"],
    #nc-root [class*="ListCard"],
    #nc-root [class*="EditorPane"],
    #nc-root [class*="CollectionContainer"],
    #nc-root [class*="LoginContainer"],
    #nc-root [class*="ObjectControl"],
    #nc-root [class*="ListControl"],
    #nc-root [class*="TopBarContainer"] {
      background: var(--admin-panel) !important;
      border: 1px solid rgba(101, 76, 56, 0.08) !important;
      box-shadow: var(--admin-shadow);
      border-radius: var(--admin-radius) !important;
    }

    #nc-root [class*="Card"],
    #nc-root [class*="ListCard"] {
      background: var(--admin-panel-strong) !important;
    }

    #nc-root [class*="ListCard"]:hover,
    #nc-root [class*="Card"]:hover {
      border-color: rgba(201, 107, 44, 0.2) !important;
      transform: translateY(-1px);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    #nc-root [class*="LoginContainer"] {
      overflow: hidden;
      position: relative;
    }

    #nc-root [class*="LoginContainer"]::before {
      content: "QuickToolLab CMS";
      display: block;
      padding: 20px 24px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--admin-text);
    }

    #nc-root [class*="LoginContainer"]::after {
      content: "管理博客与帮助内容";
      display: block;
      padding: 4px 24px 8px;
      color: var(--admin-muted);
      font-size: 14px;
    }

    #nc-root [class*="EditorHeader"],
    #nc-root h1,
    #nc-root h2,
    #nc-root h3,
    #nc-root h4 {
      color: var(--admin-text) !important;
      letter-spacing: -0.02em;
    }

    #nc-root label,
    #nc-root small,
    #nc-root p {
      color: var(--admin-muted);
    }

    #nc-root [data-slate-editor="true"] {
      background: rgba(255, 253, 248, 0.96) !important;
      border-radius: var(--admin-radius-sm) !important;
    }

    @media (max-width: 900px) {
      #admin-brand {
        top: 12px;
        left: 12px;
        padding: 8px 12px;
      }

      #admin-brand-subtitle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="admin-brand" aria-hidden="true">
    <span id="admin-brand-badge">Q</span>
    <span id="admin-brand-text">
      <span id="admin-brand-title">QuickToolLab</span>
      <span id="admin-brand-subtitle">Content Studio</span>
    </span>
  </div>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    window.CMS.init();
  </script>
</body>
</html>
