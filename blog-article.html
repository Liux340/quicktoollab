<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QuickToolLab 博客文章详情页。">
    <meta name="theme-color" content="#0a0a10">
    <meta name="robots" content="noindex,follow" id="meta-robots">
    <title>博客文章 · QuickToolLab</title>
    <script>
        (function(){
            var t = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            var l = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');
            document.documentElement.setAttribute('data-theme', t);
            document.documentElement.lang = l;
        })();
    </script>
    <link rel="canonical" href="https://quicktoollab.top/blog.html" id="canonical-link">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://quicktoollab.top/blog.html" id="meta-og-url">
    <meta property="og:title" content="博客文章 · QuickToolLab">
    <meta property="og:description" content="QuickToolLab 博客文章详情页。">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="博客文章 · QuickToolLab">
    <meta name="twitter:description" content="QuickToolLab 博客文章详情页。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a10'/><path d='M8 10h6l4 6 6-6v14H8V10z' fill='none' stroke='%23f97316' stroke-width='2' stroke-linejoin='round'/><circle cx='11' cy='22' r='2' fill='%2322c55e'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:#f97316;
            --accent2:#fb923c;
            --accentlo:rgba(249,115,22,.12);
            --green:#22c55e;
            --teal:#14b8a6;
        }
        [data-theme="dark"] {
            --bg:#0a0a10;
            --surface:#111118;
            --surface2:#18181f;
            --border:#222230;
            --text:#ededf5;
            --muted:#5a5a72;
        }
        [data-theme="light"] {
            --bg:#f2f2f7;
            --surface:#ffffff;
            --surface2:#e8e8f0;
            --border:#d8d8e8;
            --text:#16161f;
            --muted:#7a7a96;
        }
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        body {
            background:var(--bg);
            color:var(--text);
            font-family:'Outfit', sans-serif;
            line-height:1.75;
            min-height:100vh;
        }
        [data-theme="dark"] body::before {
            content:'';
            position:fixed;
            inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events:none;
            z-index:0;
        }
        header {
            position:sticky;
            top:0;
            z-index:100;
            border-bottom:1px solid var(--border);
            background:color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter:blur(18px);
        }
        .nav {
            max-width:980px;
            margin:0 auto;
            padding:10px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
        }
        .left {
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }
        .logo {
            display:flex; align-items:center; gap:10px;
            text-decoration:none;
        }
        .logo-mark {
            width:34px; height:34px; border-radius:9px;
            background:linear-gradient(135deg, #ea580c, #f97316);
            display:flex; align-items:center; justify-content:center;
            font-family:'Bebas Neue', sans-serif; font-size:18px; color:#fff;
        }
        .logo-name { font-family:'Bebas Neue', sans-serif; font-size:22px; letter-spacing:1.5px; color:var(--text); }
        .logo-name span { color:var(--accent); }
        .back-link {
            color:var(--muted);
            text-decoration:none;
            font-size:13px;
            font-weight:600;
            padding:6px 10px;
            border-radius:8px;
        }
        .back-link:hover { color:var(--accent); background:var(--accentlo); }
        .nav-right { display:flex; align-items:center; gap:6px; }
        .lang-sw {
            display:flex; gap:2px; padding:3px;
            border-radius:10px; border:1px solid var(--border);
            background:var(--surface2);
        }
        .lang-btn {
            padding:4px 9px; border:none; border-radius:7px;
            background:transparent; color:var(--muted);
            font-size:12px; font-weight:600; cursor:pointer;
            font-family:'Outfit', sans-serif;
        }
        .lang-btn.active { background:var(--accent); color:#fff; }
        .theme-btn {
            width:36px; height:36px; border-radius:10px;
            border:1px solid var(--border); background:var(--surface2);
            color:var(--muted); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .theme-btn:hover { color:var(--accent); border-color:var(--accent); }
        [data-theme="dark"] .icon-sun { display:none; }
        [data-theme="light"] .icon-moon { display:none; }
        main {
            position:relative;
            z-index:1;
            max-width:980px;
            margin:0 auto;
            padding:38px 20px 100px;
        }
        .crumb {
            display:inline-flex;
            gap:8px;
            align-items:center;
            border:1px solid var(--border);
            background:var(--surface);
            color:var(--muted);
            border-radius:8px;
            padding:6px 10px;
            margin-bottom:18px;
            font-size:12px;
        }
        .crumb a { color:var(--muted); text-decoration:none; }
        .crumb a:hover { color:var(--text); }
        .hero {
            border:1px solid var(--border);
            background:var(--surface);
            border-radius:24px;
            overflow:hidden;
            margin-bottom:22px;
        }
        .hero-cover {
            min-height:220px;
            padding:24px;
            display:flex;
            align-items:flex-end;
        }
        .hero-inner {
            padding:24px 24px 28px;
        }
        .category-pill {
            display:inline-flex;
            padding:4px 12px;
            border-radius:999px;
            background:var(--accentlo);
            color:var(--accent);
            border:1px solid rgba(249,115,22,.22);
            font-size:12px;
            font-weight:700;
            letter-spacing:.08em;
            text-transform:uppercase;
            margin-bottom:14px;
        }
        h1 {
            font-size:clamp(30px, 5vw, 50px);
            line-height:1.2;
            margin-bottom:14px;
        }
        .meta {
            display:flex;
            flex-wrap:wrap;
            gap:10px 16px;
            color:var(--muted);
            font-size:13px;
        }
        .tags {
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin-top:16px;
        }
        .tags span {
            font-size:11px;
            color:var(--accent2);
            background:rgba(249,115,22,.08);
            border:1px solid rgba(249,115,22,.18);
            padding:4px 8px;
            border-radius:999px;
        }
        article {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:24px;
            padding:28px;
        }
        article p, article li {
            color:var(--muted);
            font-size:15px;
            line-height:1.9;
        }
        article h2 {
            font-family:'Bebas Neue', sans-serif;
            font-size:26px;
            letter-spacing:2px;
            margin:28px 0 14px;
            color:var(--text);
        }
        article ul, article ol {
            padding-left:22px;
            margin:12px 0;
        }
        article blockquote {
            margin:18px 0;
            padding:14px 16px;
            border-left:3px solid var(--accent);
            background:var(--accentlo);
            border-radius:0 12px 12px 0;
            color:var(--text);
        }
        .empty {
            padding:22px;
            border:1px dashed var(--border);
            border-radius:16px;
            color:var(--muted);
            background:var(--surface);
        }
        footer {
            position:relative; z-index:1;
            border-top:1px solid var(--border);
            padding:26px 20px;
        }
        .footer-inner {
            max-width:980px; margin:0 auto;
            display:flex; align-items:center; justify-content:space-between;
            gap:12px; flex-wrap:wrap;
        }
        .footer-copy { font-size:13px; color:var(--muted); }
        .footer-links { display:flex; gap:4px; flex-wrap:wrap; }
        .footer-links a {
            font-size:13px; color:var(--muted);
            text-decoration:none; padding:4px 10px; border-radius:6px;
        }
        .footer-links a:hover { color:var(--text); background:var(--border); }
    </style>
</head>
<body>
<header>
    <div class="nav">
        <div class="left">
            <a href="/" class="logo">
                <div class="logo-mark">Q</div>
                <div class="logo-name">QUICK<span>TOOL</span>LAB</div>
            </a>
            <a class="back-link" href="/blog.html" data-i18n="back">← 返回博客</a>
        </div>
        <div class="nav-right">
            <div class="lang-sw">
                <button type="button" class="lang-btn" data-lang="zh">中文</button>
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ja">日本語</button>
            </div>
            <button type="button" class="theme-btn" id="theme-btn" aria-label="Theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="crumb"><a href="/">首页</a> / <a href="/blog.html" data-i18n="blog">博客</a> / <span data-i18n="article">文章</span></div>
    <div id="article-host"></div>
</main>

<footer>
    <div class="footer-inner">
        <span class="footer-copy">© <span id="y"></span> QuickToolLab</span>
        <div class="footer-links">
            <a href="/" data-i18n="nav_home">首页</a>
            <a href="/blog.html" data-i18n="blog">博客</a>
            <a href="/help.html" data-i18n="nav_help">帮助中心</a>
            <a href="/about.html" data-i18n="nav_about">关于</a>
            <a href="/privacy.html" data-i18n="nav_privacy">隐私政策</a>
        </div>
    </div>
</footer>

<script src="/blog-posts.js"></script>
<script>
document.getElementById('y').textContent = new Date().getFullYear();

const I18N = {
    zh: {
        back: '← 返回博客',
        blog: '博客',
        article: '文章',
        nav_home: '首页',
        nav_help: '帮助中心',
        nav_about: '关于',
        nav_privacy: '隐私政策',
        missing: '没有找到这篇文章，请返回博客列表重新选择。',
        read: '阅读',
        fallback_title: '博客文章 · QuickToolLab'
    },
    en: {
        back: '← Back to Blog',
        blog: 'Blog',
        article: 'Article',
        nav_home: 'Home',
        nav_help: 'Help',
        nav_about: 'About',
        nav_privacy: 'Privacy',
        missing: 'Post not found. Please return to the blog list.',
        read: 'Read',
        fallback_title: 'Blog Post · QuickToolLab'
    },
    ja: {
        back: '← ブログへ戻る',
        blog: 'ブログ',
        article: '記事',
        nav_home: 'ホーム',
        nav_help: 'ヘルプ',
        nav_about: '概要',
        nav_privacy: 'プライバシー',
        missing: '記事が見つかりません。ブログ一覧から選び直してください。',
        read: '読む',
        fallback_title: 'ブログ記事 · QuickToolLab'
    }
};

const POSTS = Array.isArray(window.BLOG_POSTS) ? window.BLOG_POSTS : [];
const BASE_URL = 'https://quicktoollab.top';
let lang = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');
let theme = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

function pick(field) {
    if (field == null) return '';
    if (typeof field === 'string') return field;
    return field[lang] || field.zh || field.en || field.ja || '';
}

function getId() {
    return new URLSearchParams(location.search).get('id') || '';
}

function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value || '';
    return div.innerHTML;
}

function stripHtml(value) {
    const div = document.createElement('div');
    div.innerHTML = value || '';
    return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
}

function setMeta(selector, value) {
    const el = document.querySelector(selector);
    if (el) el.setAttribute('content', value);
}

function updateSeo(post) {
    const dict = I18N[lang];
    const canonical = post ? `${BASE_URL}/blog-article.html?id=${encodeURIComponent(post.id)}` : `${BASE_URL}/blog.html`;
    const title = post ? `${pick(post.title)} · QuickToolLab` : dict.fallback_title;
    const description = post ? stripHtml(pick(post.contentHtml)).slice(0, 150) : dict.fallback_title;
    document.title = title;
    document.getElementById('canonical-link').setAttribute('href', canonical);
    document.getElementById('meta-robots').setAttribute('content', post ? 'index,follow' : 'noindex,follow');
    setMeta('meta[name="description"]', description);
    setMeta('meta[property="og:url"]', canonical);
    setMeta('meta[property="og:title"]', title);
    setMeta('meta[property="og:description"]', description);
    setMeta('meta[name="twitter:title"]', title);
    setMeta('meta[name="twitter:description"]', description);
}

function renderArticle() {
    const dict = I18N[lang];
    const post = POSTS.find(item => item.id === getId());
    const host = document.getElementById('article-host');
    updateSeo(post);
    if (!post) {
        host.innerHTML = `<div class="empty">${escapeHtml(dict.missing)}</div>`;
        return;
    }
    const tags = (post.tags && (post.tags[lang] || post.tags.zh || post.tags.en || post.tags.ja || [])).map(tag => `<span>${escapeHtml(tag)}</span>`).join('');
    host.innerHTML = `
        <section class="hero">
            <div class="hero-cover" style="background:${post.cover}"></div>
            <div class="hero-inner">
                <div class="category-pill">${escapeHtml(pick(post.category))}</div>
                <h1>${escapeHtml(pick(post.title))}</h1>
                <div class="meta">
                    <span>${escapeHtml(post.date)}</span>
                    <span>${escapeHtml(dict.read)} · ${escapeHtml(post.readTime)}</span>
                </div>
                <div class="tags">${tags}</div>
            </div>
        </section>
        <article>${pick(post.contentHtml)}</article>
    `;
}

function applyLang(nextLang) {
    lang = nextLang;
    localStorage.setItem('pc_lang', nextLang);
    document.documentElement.lang = nextLang;
    const dict = I18N[nextLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (dict[key] != null) el.textContent = dict[key];
    });
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === nextLang));
    renderArticle();
}

function applyTheme(nextTheme) {
    theme = nextTheme;
    localStorage.setItem('pc_theme', nextTheme);
    document.documentElement.setAttribute('data-theme', nextTheme);
}

document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));

applyTheme(theme);
applyLang(lang);
</script>
</body>
</html>
