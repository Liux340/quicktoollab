    <style>
        :root {
            --accent:   #f97316;
            --accent2:  #fb923c;
            --accentlo: rgba(249,115,22,.12);
            --green:    #22c55e;
            --teal:     #14b8a6;
        }
        [data-theme="dark"] {
            --bg:      #0a0a10;
            --surface: #111118;
            --surface2:#18181f;
            --border:  #222230;
            --text:    #ededf5;
            --muted:   #5a5a72;
        }
        [data-theme="light"] {
            --bg:      #f2f2f7;
            --surface: #ffffff;
            --surface2:#e8e8f0;
            --border:  #d8d8e8;
            --text:    #16161f;
            --muted:   #7a7a96;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif; font-weight: 400;
            line-height: 1.6; min-height: 100vh; overflow-x: hidden;
            transition: background .3s, color .3s;
        }

        [data-theme="dark"] body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }
        [data-theme="dark"] body::after {
            content: ''; position: fixed;
            top: -300px; left: 50%; transform: translateX(-50%);
            width: 900px; height: 700px;
            background: radial-gradient(ellipse, rgba(249,115,22,.06) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        header {
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter: blur(18px);
            transition: background .3s, border-color .3s;
        }
        .nav {
            max-width: 1160px; margin: 0 auto;
            padding: 0 20px; min-height: 58px;
            display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; padding-top: 10px; padding-bottom: 10px;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
        .logo-mark {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #ea580c, #f97316);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bebas Neue', sans-serif; font-size: 19px; color: #fff;
        }
        .logo-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; color: var(--text); transition: color .3s; }
        .logo-name span { color: var(--accent); }
        .logo-sub { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .3px; margin-top: -2px; }

        .nav-links {
            display: flex; align-items: center; flex-wrap: wrap; gap: 4px 8px;
            justify-content: center; flex: 1;
        }
        .nav-links a {
            font-size: 12.5px; font-weight: 600; color: var(--muted);
            text-decoration: none; padding: 6px 10px; border-radius: 8px;
            transition: color .18s, background .18s;
        }
        .nav-links a:hover { color: var(--accent); background: var(--accentlo); }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        .lang-sw {
            display: flex; gap: 2px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 3px;
        }
        .lang-btn {
            padding: 4px 9px; border-radius: 7px; border: none;
            background: transparent; color: var(--muted);
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all .18s; font-family: 'Outfit', sans-serif;
        }
        .lang-btn.active { background: var(--accent); color: #fff; }
        .lang-btn:not(.active):hover { color: var(--text); }

        .theme-btn {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .theme-btn:hover { color: var(--accent); border-color: var(--accent); }
        [data-theme="dark"] .icon-sun  { display: none; }
        [data-theme="dark"] .icon-moon { display: block; }
        [data-theme="light"] .icon-sun  { display: block; }
        [data-theme="light"] .icon-moon { display: none; }

        main { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 36px 20px 100px; }

        .hero { text-align: center; margin-bottom: 40px; animation: up .55s ease both; }
        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(38px, 7vw, 72px); letter-spacing: 3px; line-height: 1.05;
            background: linear-gradient(120deg, var(--text) 35%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 12px;
        }
        .hero p { color: var(--muted); font-size: 15px; max-width: 520px; margin: 0 auto; }

        .blog-spotlight {
            margin: 0 0 34px;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            background:
                linear-gradient(135deg, rgba(249,115,22,.14), transparent 42%),
                linear-gradient(180deg, var(--surface), color-mix(in srgb, var(--surface2) 92%, transparent));
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 18px;
        }
        @media (max-width: 900px) { .blog-spotlight { grid-template-columns: 1fr; } }
        .blog-spotlight h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(30px, 5vw, 52px);
            letter-spacing: 2px;
            line-height: 1.02;
            margin-bottom: 10px;
        }
        .blog-spotlight p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.8;
            max-width: 620px;
        }
        .blog-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 16px 0 18px;
        }
        .blog-badges span {
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(249,115,22,.22);
            background: var(--accentlo);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .blog-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .blog-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: .18s;
        }
        .blog-btn.primary {
            color: #fff;
            background: linear-gradient(135deg, #ea580c, #f97316);
            box-shadow: 0 16px 30px rgba(249,115,22,.18);
        }
        .blog-btn.secondary {
            color: var(--text);
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .blog-notes {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .blog-note {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: color-mix(in srgb, var(--surface2) 92%, transparent);
            padding: 14px 16px;
        }
        .blog-note strong {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text);
        }
        .blog-note span {
            display: block;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
        }

        .section-block { margin-bottom: 44px; animation: up .5s ease both; }
        .section-block:nth-child(2) { animation-delay: .04s; }
        .section-block:nth-child(3) { animation-delay: .08s; }
        .section-head {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
            color: var(--text); display: flex; align-items: center; gap: 10px;
        }
        .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 0 3px rgba(20,184,166,.2); }
        .section-more {
            font-size: 12px; font-weight: 600; color: var(--green);
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
        }
        .section-more:hover { text-decoration: underline; }

        .tools-host { display: flex; flex-direction: column; gap: 28px; }
        .tools-cat-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
            color: var(--muted); margin: 0 0 12px; padding-left: 2px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .tool-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px 12px;
            text-align: center; text-decoration: none; color: inherit;
            transition: border-color .2s, transform .15s, background .2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--surface2); }
        .tool-card .ic {
            width: 40px; height: 40px; border-radius: 11px;
            background: var(--accentlo); border: 1px solid rgba(249,115,22,.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .tool-card h3 { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.35; }
        .tool-card span.tag { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 900px) { .row-2 { grid-template-columns: 1fr; } }

        .list-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
        }
        .list-item {
            display: flex; gap: 12px; padding: 12px 14px;
            border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
            transition: background .15s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: var(--surface2); }
        .list-item .thumb {
            width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
            background: var(--surface2); flex-shrink: 0;
        }
        .list-item .body { flex: 1; min-width: 0; }
        .list-item .t { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .list-item .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

        .gh-item {
            display: flex; gap: 12px; padding: 12px 14px;
            border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
            transition: background .15s;
        }
        .gh-item:last-child { border-bottom: none; }
        .gh-item:hover { background: var(--surface2); }
        .gh-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: var(--surface2); }
        .gh-repo { font-size: 13px; font-weight: 600; color: var(--accent2); font-family: ui-monospace, monospace; word-break: break-all; }
        .gh-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .gh-foot { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .lang-dot { width: 8px; height: 8px; border-radius: 50%; }

        .slides-scroll {
            display: flex; gap: 14px; overflow-x: auto;
            padding-bottom: 8px; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .slides-scroll::-webkit-scrollbar { height: 6px; }
        .slides-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .slide-card {
            flex: 0 0 220px; scroll-snap-align: start;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit;
            transition: border-color .2s;
        }
        .slide-card:hover { border-color: var(--accent); }
        .slide-cover-wrap { position: relative; aspect-ratio: 16/10; background: var(--surface2); }
        .slide-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .slide-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,.72); color: #fff; font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 6px;
        }
        .slide-card .cap { padding: 10px 12px; font-size: 12.5px; font-weight: 600; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .soft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .soft-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; text-decoration: none; color: inherit;
            transition: border-color .2s; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
        }
        .soft-card:hover { border-color: var(--green); }
        .soft-card .ico {
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--surface2); border: 1px solid var(--border);
            object-fit: cover;
        }
        .soft-card h4 { font-size: 13px; font-weight: 600; color: var(--text); }
        .soft-card p { font-size: 11.5px; color: var(--muted); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .soft-card .plat { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .5px; margin-top: auto; padding-top: 4px; }

        .loading, .error-box {
            padding: 28px; text-align: center; color: var(--muted); font-size: 13px;
        }
        .error-box { color: #f87171; }
        

        .skeleton {
            background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
            background-size: 200% 100%; animation: sk 1.2s ease infinite;
            border-radius: 8px;
        }
        @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 26px 20px; }
        .footer-inner {
            max-width: 1160px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .footer-copy { font-size: 13px; color: var(--muted); }
        .footer-links { display: flex; gap: 4px; flex-wrap: wrap; }
        .footer-links a {
            font-size: 13px; color: var(--muted); text-decoration: none;
            padding: 4px 10px; border-radius: 6px; transition: color .2s, background .2s;
        }
        .footer-links a:hover { color: var(--text); background: var(--border); }

        @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

        /* 鈹€鈹€ 缃《鎺ㄨ崘鍖?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
        .pinned-section {
            background: linear-gradient(135deg, rgba(249,115,22,.08), rgba(234,179,8,.06));
            border: 1px solid rgba(249,115,22,.25);
            border-radius: 18px; padding: 22px 20px 18px;
            margin-bottom: 44px; position: relative; overflow: hidden;
        }
        .pinned-section::before {
            content: ''; position: absolute; top: -60px; right: -60px;
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(249,115,22,.08), transparent 70%);
            pointer-events: none;
        }
        .pinned-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--accent); color: #fff;
            font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
            padding: 3px 9px; border-radius: 100px; margin-bottom: 14px;
        }
        .pinned-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;
        }
        .pinned-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 14px 12px;
            text-decoration: none; color: inherit;
            transition: border-color .2s, transform .15s;
            display: flex; flex-direction: column; gap: 6px;
        }
        .pinned-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .pinned-card-top { display: flex; align-items: center; gap: 8px; }
        .pinned-icon {
            width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 17px;
            background: var(--accentlo); border: 1px solid rgba(249,115,22,.2);
        }
        .pinned-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
        .pinned-brand { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: .3px; }
        .pinned-desc { font-size: 11.5px; color: var(--muted); line-height: 1.55; }

        /* 鈹€鈹€ 宸ュ叿鍖?tab 鍒囨崲 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
        .tools-tab-bar {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .tools-tab {
            padding: 6px 14px; border-radius: 100px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 12.5px; font-weight: 600;
            cursor: pointer; transition: all .18s; font-family: 'Outfit', sans-serif;
        }
        .tools-tab:hover { border-color: var(--accent2); color: var(--accent2); }
        .tools-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* 鈹€鈹€ AI 宸ュ叿鍖?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
        .ai-section { display: none; }
        .ai-section.visible { display: block; }
        .ai-tab-bar {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
        }
        .ai-tab {
            padding: 5px 13px; border-radius: 100px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all .18s; font-family: 'Outfit', sans-serif;
        }
        .ai-tab:hover { border-color: #a855f7; color: #a855f7; }
        .ai-tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
        .ai-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px;
        }

let lang = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');

function applyLang(l) {
    lang = l;
    localStorage.setItem('pc_lang', l);
    document.documentElement.lang = l;
    const t = I18N[l];
    document.title = t.page_title;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (t[k] != null) el.textContent = t[k];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const k = el.dataset.i18nPlaceholder;
        if (t[k] != null) el.setAttribute('placeholder', t[k]);
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
    renderPinned();
    renderAiTools(currentAiCat);
    renderTools();
    renderFavDrawer();
    renderHistDrawer();
    loadDynamicContent();
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

let theme = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
function applyTheme(t) {
    theme = t;
    localStorage.setItem('pc_theme', t);
    document.documentElement.setAttribute('data-theme', t);
}
document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('pc_theme')) applyTheme(e.matches ? 'dark' : 'light');
});

function getFavs()  { try { return JSON.parse(localStorage.getItem('qtl_favs_v1')  || '[]'); } catch(_){ return []; } }
function getHist()  { try { return JSON.parse(localStorage.getItem('qtl_hist_v1')  || '[]'); } catch(_){ return []; } }
function setFavs(v) { localStorage.setItem('qtl_favs_v1',  JSON.stringify(v)); }
function setHist(v) { localStorage.setItem('qtl_hist_v1',  JSON.stringify(v)); }

function isFav(href) { return getFavs().some(x => x.href === href); }

function toggleFav(href, name, icon) {
    const favs = getFavs();
    const idx  = favs.findIndex(x => x.href === href);
    if (idx >= 0) favs.splice(idx, 1);
    else favs.unshift({ href, name, icon, time: Date.now() });
    setFavs(favs);
    updateBadges();
    renderFavDrawer();
    // 鏇存柊鎵€鏈夊搴旀寜閽姸鎬?    document.querySelectorAll(`.fav-btn[data-href="${CSS.escape(href)}"]`).forEach(btn => {
        btn.textContent = isFav(href) ? '猸? : '鈽?;
        btn.classList.toggle('saved', isFav(href));
    });
}

function addHist(href, name, icon) {
    const hist = getHist().filter(x => x.href !== href);
    hist.unshift({ href, name, icon, time: Date.now() });
    setHist(hist.slice(0, 30));
    updateBadges();
    renderHistDrawer();
}

function updateBadges() {
    const fc = getFavs().length;
    const hc = getHist().length;
    const fb = document.getElementById('fav-badge');
    const hb = document.getElementById('hist-badge');
    if (fb) { fb.textContent = fc; fb.classList.toggle('show', fc > 0); }
    if (hb) { hb.textContent = hc; hb.classList.toggle('show', hc > 0); }
}

function renderFavDrawer() {
    const body = document.getElementById('fav-body');
    const t    = I18N[lang];
    const favs = getFavs();
    if (!favs.length) { body.innerHTML = `<div class="drawer-empty">${escapeHtml(t.drawer_empty_fav || '杩樻病鏈夋敹钘忎换浣曞伐鍏?)}</div>`; return; }
    body.innerHTML = favs.map(x => `
        <a class="drawer-item" href="${x.href}" target="_blank" rel="noopener noreferrer"
           onclick="addHist('${x.href}','${escapeHtml(x.name)}','${escapeHtml(x.icon)}')">

            <div class="drawer-item-info">
                <div class="drawer-item-name">${escapeHtml(x.name)}</div>
            </div>

}

function renderHistDrawer() {
    const body = document.getElementById('hist-body');
    const t    = I18N[lang];
    const hist = getHist();

    body.innerHTML = hist.map(x => {

        const agoStr = ago < 60 ? ago + (lang === 'zh' ? ' 鍒嗛挓鍓? : lang === 'ja' ? ' 鍒嗗墠' : ' min ago')
                     : ago < 1440 ? Math.floor(ago/60) + (lang === 'zh' ? ' 灏忔椂鍓? : lang === 'ja' ? ' 鏅傞枔鍓? : ' hr ago')
                     : Math.floor(ago/1440) + (lang === 'zh' ? ' 澶╁墠' : lang === 'ja' ? ' 鏃ュ墠' : ' days ago');
        return `

           onclick="addHist('${x.href}','${escapeHtml(x.name)}','${escapeHtml(x.icon)}')">

}

const GH_HEADERS = { Accept: 'application/vnd.github+json' };

function relDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const ms = Date.now() - d.getTime();
    const mins = Math.floor(ms / 60000);
    const hours = Math.floor(ms / 3600000);
    const days = Math.floor(ms / 86400000);
    if (lang === 'zh') {
        if (mins < 60) return Math.max(1, mins) + ' 鍒嗛挓鍓?;
        if (hours < 24) return hours + ' 灏忔椂鍓?;
        if (days < 7) return days + ' 澶╁墠';
    } else if (lang === 'ja') {
        if (mins < 60) return Math.max(1, mins) + ' 鍒嗗墠';
        if (hours < 24) return hours + ' 鏅傞枔鍓?;
        if (days < 7) return days + ' 鏃ュ墠';
    } else {
        if (mins < 60) return Math.max(1, mins) + ' min ago';
        if (hours < 24) return hours + ' hr ago';
        if (days < 7) return days + ' days ago';
    }
    return d.toLocaleDateString(lang === 'zh' ? 'zh-CN' : lang === 'ja' ? 'ja-JP' : 'en-US');
}

        `).join('') || `<div class="loading">${escapeHtml(t.load_err)}</div>`;
    } catch (e) {
        errBox('soft-host', loadDynamicContent);
    }
}

function fmtStars(n) {
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
}

function langColor(name) {
    const map = { JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', Go: '#00ADD8', Rust: '#dea584', Ruby: '#701516', 'C++': '#f34b7d', C: '#555555', Swift: '#F05138', Kotlin: '#A97BFF', Java: '#b07219' };
    return map[name] || '#8b949e';
}
