    <style>
        :root {
            --accent:   #f97316;
            --accent2:  #fb923c;
            --accentlo: rgba(249,115,22,.12);
            --green:    #22c55e;
            --teal:     #14b8a6;
        }
        [data-theme="dark"] {
            --bg:      #0a0a10;
            --surface: #111118;
            --surface2:#18181f;
            --border:  #222230;
            --text:    #ededf5;
            --muted:   #5a5a72;
        }
        [data-theme="light"] {
            --bg:      #f2f2f7;
            --surface: #ffffff;
            --surface2:#e8e8f0;
            --border:  #d8d8e8;
            --text:    #16161f;
            --muted:   #7a7a96;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif; font-weight: 400;
            line-height: 1.6; min-height: 100vh; overflow-x: hidden;
            transition: background .3s, color .3s;
        }

        [data-theme="dark"] body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }
        [data-theme="dark"] body::after {
            content: ''; position: fixed;
            top: -300px; left: 50%; transform: translateX(-50%);
            width: 900px; height: 700px;
            background: radial-gradient(ellipse, rgba(249,115,22,.06) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        header {
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter: blur(18px);
            transition: background .3s, border-color .3s;
        }
        .nav {
            max-width: 1160px; margin: 0 auto;
            padding: 0 20px; min-height: 58px;
            display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; padding-top: 10px; padding-bottom: 10px;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
        .logo-mark {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #ea580c, #f97316);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bebas Neue', sans-serif; font-size: 19px; color: #fff;
        }
        .logo-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; color: var(--text); transition: color .3s; }
        .logo-name span { color: var(--accent); }
        .logo-sub { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .3px; margin-top: -2px; }

        .nav-links {
            display: flex; align-items: center; flex-wrap: wrap; gap: 4px 8px;
            justify-content: center; flex: 1;
        }
        .nav-links a {
            font-size: 12.5px; font-weight: 600; color: var(--muted);
            text-decoration: none; padding: 6px 10px; border-radius: 8px;
            transition: color .18s, background .18s;
        }
        .nav-links a:hover { color: var(--accent); background: var(--accentlo); }

        .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        .lang-sw {
            display: flex; gap: 2px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 3px;
        }
        .lang-btn {
            padding: 4px 9px; border-radius: 7px; border: none;
            background: transparent; color: var(--muted);
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all .18s; font-family: 'Outfit', sans-serif;
        }
        .lang-btn.active { background: var(--accent); color: #fff; }
        .lang-btn:not(.active):hover { color: var(--text); }

        .theme-btn {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .theme-btn:hover { color: var(--accent); border-color: var(--accent); }
        [data-theme="dark"] .icon-sun  { display: none; }
        [data-theme="dark"] .icon-moon { display: block; }
        [data-theme="light"] .icon-sun  { display: block; }
        [data-theme="light"] .icon-moon { display: none; }

        main { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 36px 20px 100px; }

        .hero { text-align: center; margin-bottom: 40px; animation: up .55s ease both; }
        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(38px, 7vw, 72px); letter-spacing: 3px; line-height: 1.05;
            background: linear-gradient(120deg, var(--text) 35%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 12px;
        }
        .hero p { color: var(--muted); font-size: 15px; max-width: 520px; margin: 0 auto; }

        .section-block { margin-bottom: 44px; animation: up .5s ease both; }
        .section-block:nth-child(2) { animation-delay: .04s; }
        .section-block:nth-child(3) { animation-delay: .08s; }
        .section-head {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
            color: var(--text); display: flex; align-items: center; gap: 10px;
        }
        .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 0 3px rgba(20,184,166,.2); }
        .section-more {
            font-size: 12px; font-weight: 600; color: var(--green);
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
        }
        .section-more:hover { text-decoration: underline; }

        .tools-host { display: flex; flex-direction: column; gap: 28px; }
        .tools-cat-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
            color: var(--muted); margin: 0 0 12px; padding-left: 2px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .tool-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px 12px;
            text-align: center; text-decoration: none; color: inherit;
            transition: border-color .2s, transform .15s, background .2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--surface2); }
        .tool-card .ic {
            width: 40px; height: 40px; border-radius: 11px;
            background: var(--accentlo); border: 1px solid rgba(249,115,22,.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .tool-card h3 { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.35; }
        .tool-card span.tag { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 900px) { .row-2 { grid-template-columns: 1fr; } }

        .list-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
        }
        .list-item {
            display: flex; gap: 12px; padding: 12px 14px;
            border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
            transition: background .15s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: var(--surface2); }
        .list-item .thumb {
            width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
            background: var(--surface2); flex-shrink: 0;
        }
        .list-item .body { flex: 1; min-width: 0; }
        .list-item .t { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .list-item .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

        .gh-item {
            display: flex; gap: 12px; padding: 12px 14px;
            border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
            transition: background .15s;
        }
        .gh-item:last-child { border-bottom: none; }
        .gh-item:hover { background: var(--surface2); }
        .gh-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: var(--surface2); }
        .gh-repo { font-size: 13px; font-weight: 600; color: var(--accent2); font-family: ui-monospace, monospace; word-break: break-all; }
        .gh-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .gh-foot { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .lang-dot { width: 8px; height: 8px; border-radius: 50%; }

        .slides-scroll {
            display: flex; gap: 14px; overflow-x: auto;
            padding-bottom: 8px; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .slides-scroll::-webkit-scrollbar { height: 6px; }
        .slides-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .slide-card {
            flex: 0 0 220px; scroll-snap-align: start;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit;
            transition: border-color .2s;
        }
        .slide-card:hover { border-color: var(--accent); }
        .slide-cover-wrap { position: relative; aspect-ratio: 16/10; background: var(--surface2); }
        .slide-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .slide-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,.72); color: #fff; font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 6px;
        }
        .slide-card .cap { padding: 10px 12px; font-size: 12.5px; font-weight: 600; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .soft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .soft-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; text-decoration: none; color: inherit;
            transition: border-color .2s; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
        }
        .soft-card:hover { border-color: var(--green); }
        .soft-card .ico {
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--surface2); border: 1px solid var(--border);
            object-fit: cover;
        }
        .soft-card h4 { font-size: 13px; font-weight: 600; color: var(--text); }
        .soft-card p { font-size: 11.5px; color: var(--muted); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .soft-card .plat { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .5px; margin-top: auto; padding-top: 4px; }

        .loading, .error-box {
            padding: 28px; text-align: center; color: var(--muted); font-size: 13px;
        }
        .error-box { color: #f87171; }
        .retry-btn {
            margin-top: 10px; padding: 8px 16px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .retry-btn:hover { border-color: var(--accent); color: var(--accent); }

        .skeleton {
            background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
            background-size: 200% 100%; animation: sk 1.2s ease infinite;
            border-radius: 8px;
        }
        @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 26px 20px; }
        .footer-inner {
            max-width: 1160px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .footer-copy { font-size: 13px; color: var(--muted); }
        .footer-links { display: flex; gap: 4px; flex-wrap: wrap; }
        .footer-links a {
            font-size: 13px; color: var(--muted); text-decoration: none;
            padding: 4px 10px; border-radius: 6px; transition: color .2s, background .2s;
        }
        .footer-links a:hover { color: var(--text); background: var(--border); }

        @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    </style>

let lang = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');

function applyLang(l) {
    lang = l;
    localStorage.setItem('pc_lang', l);
    document.documentElement.lang = l;
    const t = I18N[l];
    document.title = t.page_title;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (t[k] != null) el.textContent = t[k];
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
    renderTools();
    loadDynamicContent();
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

let theme = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
function applyTheme(t) {
    theme = t;
    localStorage.setItem('pc_theme', t);
    document.documentElement.setAttribute('data-theme', t);
}
document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('pc_theme')) applyTheme(e.matches ? 'dark' : 'light');
});

function renderTools() {
    const host = document.getElementById('tools-host');
    const cats = TOOLS[lang] || TOOLS.en;
    host.innerHTML = cats.map(cat => `
        <div class="tools-category">
            <h3 class="tools-cat-title">${escapeHtml(cat.title)}</h3>
            <div class="tools-grid">
                ${cat.items.map(x => `
        <a class="tool-card" href="${x.href}" ${x.int ? '' : 'target="_blank" rel="noopener noreferrer"'}>
            <div class="ic">${escapeHtml(x.icon)}</div>
            <h3>${escapeHtml(x.title)}</h3>
            <span class="tag">${escapeHtml(x.tag)}</span>
        </a>`).join('')}
            </div>
        </div>
    `).join('');
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

const GH_HEADERS = { Accept: 'application/vnd.github+json' };

function relDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const ms = Date.now() - d.getTime();
    const mins = Math.floor(ms / 60000);
    const hours = Math.floor(ms / 3600000);
    const days = Math.floor(ms / 86400000);
    if (lang === 'zh') {
        if (mins < 60) return Math.max(1, mins) + ' 分钟前';
        if (hours < 24) return hours + ' 小时前';
        if (days < 7) return days + ' 天前';
    } else if (lang === 'ja') {
        if (mins < 60) return Math.max(1, mins) + ' 分前';
        if (hours < 24) return hours + ' 時間前';
        if (days < 7) return days + ' 日前';
    } else {
        if (mins < 60) return Math.max(1, mins) + ' min ago';
        if (hours < 24) return hours + ' hr ago';
        if (days < 7) return days + ' days ago';
    }
    return d.toLocaleDateString(lang === 'zh' ? 'zh-CN' : lang === 'ja' ? 'ja-JP' : 'en-US');
}

async function fetchDevTo(path) {
    const r = await fetch('https://dev.to/api/articles' + path, { credentials: 'omit' });
    if (!r.ok) throw new Error('dev.to ' + r.status);
    return r.json();
}

async function fetchGitHub(path) {
    const r = await fetch('https://api.github.com' + path, { headers: GH_HEADERS, credentials: 'omit' });
    if (!r.ok) throw new Error('github ' + r.status);
    return r.json();
}

function errBox(hostId, onRetry) {
    const t = I18N[lang];
    const el = document.getElementById(hostId);
    el.innerHTML = `<div class="error-box">${escapeHtml(t.load_err)}<br><button type="button" class="retry-btn">${escapeHtml(t.retry)}</button></div>`;
    el.querySelector('.retry-btn').addEventListener('click', onRetry);
}

async function loadDynamicContent() {
    const t = I18N[lang];
    document.getElementById('library-host').innerHTML = `<div class="loading">${escapeHtml(t.loading)}</div>`;
    document.getElementById('oss-host').innerHTML = `<div class="loading">${escapeHtml(t.loading)}</div>`;
    document.getElementById('slides-host').innerHTML = `<div class="loading skeleton" style="height:120px;border-radius:14px;"></div>`;
    document.getElementById('soft-host').innerHTML = `<div class="loading skeleton" style="height:100px;border-radius:14px;grid-column:1/-1;"></div>`;

    try {
        const articles = await fetchDevTo('?per_page=12&top=7');
        const lib = articles.slice(0, 8);
        document.getElementById('library-host').innerHTML = lib.map(a => `
            <a class="list-item" href="${a.url}" target="_blank" rel="noopener noreferrer">
                <img class="thumb" src="${a.cover_image || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56"><rect fill="%2318181f" width="56" height="56"/><text x="28" y="32" text-anchor="middle" fill="%235a5a72" font-size="10">DEV</text></svg>')}" alt="" width="56" height="56" loading="lazy" decoding="async">
                <div class="body">
                    <div class="t">${escapeHtml(a.title)}</div>
                    <div class="meta">${escapeHtml(a.user.name)} · ${relDate(a.published_at)}</div>
                </div>
            </a>
        `).join('') || `<div class="loading">${escapeHtml(t.load_err)}</div>`;

        const withCover = articles.filter(a => a.cover_image).slice(0, 10);
        const slides = withCover.length >= 4 ? withCover : articles.slice(0, 8);
        document.getElementById('slides-host').innerHTML = `
            <div class="slides-scroll">
                ${slides.map(a => `
                    <a class="slide-card" href="${a.url}" target="_blank" rel="noopener noreferrer">
                        <div class="slide-cover-wrap">
                            <img src="${a.cover_image || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="220" height="138"><rect fill="%2318181f" width="220" height="138"/></svg>')}" alt="" loading="lazy" decoding="async">
                            <span class="slide-badge">${a.reading_time_minutes != null ? a.reading_time_minutes + (lang === 'zh' ? ' 分钟' : lang === 'ja' ? ' 分' : ' min') : (a.public_reactions_count != null ? '♥ ' + a.public_reactions_count : 'DEV')}</span>
                        </div>
                        <div class="cap">${escapeHtml(a.title)}</div>
                    </a>
                `).join('')}
            </div>`;
    } catch (e) {
        errBox('library-host', loadDynamicContent);
        errBox('slides-host', loadDynamicContent);
    }

    try {
        const data = await fetchGitHub('/search/repositories?q=stars:%3E3000&sort=stars&order=desc&per_page=8');
        document.getElementById('oss-host').innerHTML = (data.items || []).map(r => {
            const col = langColor(r.language);
            return `
            <a class="gh-item" href="${r.html_url}" target="_blank" rel="noopener noreferrer">
                <img class="gh-avatar" src="${r.owner.avatar_url}" alt="" width="40" height="40" loading="lazy" decoding="async">
                <div style="flex:1;min-width:0;">
                    <div class="gh-repo">${escapeHtml(r.full_name)}</div>
                    <div class="gh-desc">${escapeHtml(r.description || '')}</div>
                    <div class="gh-foot">
                        ${r.language ? `<span style="display:inline-flex;align-items:center;gap:6px;"><span class="lang-dot" style="background:${col}"></span>${escapeHtml(r.language)}</span>` : ''}
                        <span>★ ${fmtStars(r.stargazers_count)}</span>
                    </div>
                </div>
            </a>`;
        }).join('') || `<div class="loading">${escapeHtml(t.load_err)}</div>`;
    } catch (e) {
        errBox('oss-host', loadDynamicContent);
    }

    try {
        const soft = await fetchGitHub('/search/repositories?q=topic:cli+stars:%3E400&sort=stars&order=desc&per_page=9');
        document.getElementById('soft-host').innerHTML = (soft.items || []).map(r => `
            <a class="soft-card" href="${r.html_url}" target="_blank" rel="noopener noreferrer">
                <img class="ico" src="${r.owner.avatar_url}" alt="" width="44" height="44" loading="lazy" decoding="async">
                <h4>${escapeHtml(r.name)}</h4>
                <p>${escapeHtml((r.description || '').slice(0, 120))}</p>
                <span class="plat">${escapeHtml(r.language || 'OSS')}</span>
            </a>
        `).join('') || `<div class="loading">${escapeHtml(t.load_err)}</div>`;
    } catch (e) {
        errBox('soft-host', loadDynamicContent);
    }
}

function fmtStars(n) {
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
}

function langColor(name) {
    const map = { JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', Go: '#00ADD8', Rust: '#dea584', Ruby: '#701516', 'C++': '#f34b7d', C: '#555555', Swift: '#F05138', Kotlin: '#A97BFF', Java: '#b07219' };
    return map[name] || '#8b949e';
}

applyTheme(theme);
applyLang(lang);
</script>
</body>
</html>
