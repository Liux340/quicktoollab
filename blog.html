    <style>
        :root{--accent:#f97316;--accent2:#fb923c;--accentlo:rgba(249,115,22,.12);--green:#22c55e;--teal:#14b8a6;--purple:#8b5cf6;}
        [data-theme="dark"]{--bg:#0a0a10;--surface:#111118;--surface2:#18181f;--border:#222230;--text:#ededf5;--text2:#9090b0;--muted:#5a5a72;}
        [data-theme="light"]{--bg:#f2f2f7;--surface:#ffffff;--surface2:#f0f0f8;--border:#d8d8e8;--text:#16161f;--text2:#4a4a6a;--muted:#7a7a96;}

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
        a{text-decoration:none;color:inherit;}

        [data-theme="dark"] body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

        /* ── Header ── */
        header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(18px);transition:background .3s,border-color .3s;}
        .nav{max-width:1160px;margin:0 auto;padding:0 20px;min-height:58px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding-top:10px;padding-bottom:10px;}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
        .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#ea580c,#f97316);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:#fff;}
        .logo-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--text);transition:color .3s;}
        .logo-name span{color:var(--accent);}
        .nav-links{display:flex;align-items:center;flex-wrap:wrap;gap:4px 8px;justify-content:center;flex:1;}
        .nav-links a{font-size:12.5px;font-weight:600;color:var(--muted);text-decoration:none;padding:6px 10px;border-radius:8px;transition:color .18s,background .18s;}
        .nav-links a:hover,.nav-links a.active{color:var(--accent);background:var(--accentlo);}
        .nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
        .lang-sw{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;}
        .lang-btn{padding:4px 9px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif;}
        .lang-btn.active{background:var(--accent);color:#fff;}
        .lang-btn:not(.active):hover{color:var(--text);}
        .theme-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
        .theme-btn:hover{color:var(--accent);border-color:var(--accent);}
        [data-theme="dark"] .icon-sun{display:none;}[data-theme="dark"] .icon-moon{display:block;}
        [data-theme="light"] .icon-sun{display:block;}[data-theme="light"] .icon-moon{display:none;}

        /* ── Hero Banner ── */
        .blog-hero{
            position:relative;overflow:hidden;
            background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
            border-bottom:1px solid var(--border);
            padding:60px 20px 50px;
            text-align:center;
        }
        .blog-hero::before{
            content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,.12),transparent 65%);
            pointer-events:none;
        }
        .blog-hero::after{
            content:'BLOG';position:absolute;
            font-family:'Bebas Neue',sans-serif;font-size:220px;font-weight:700;
            color:var(--text);opacity:.025;letter-spacing:8px;

        .blog-hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto;}
        .blog-hero-badge{

            background:var(--accentlo);border:1px solid rgba(249,115,22,.3);
            font-size:12px;font-weight:700;color:var(--accent);
            letter-spacing:.5px;text-transform:uppercase;margin-bottom:20px;
        }
        .blog-hero h1{
            font-family:'Bebas Neue',sans-serif;

        .hero-stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--accent);}
        .hero-stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

        /* ── Main layout ── */

        /* ── Filter & Search ── */
        .filter-bar{
            display:flex;align-items:center;justify-content:space-between;

        .filter-tag{

        .search-wrap input::placeholder{color:var(--muted);}

        .post-card{
            background:var(--surface);border:1px solid var(--border);
            border-radius:18px;overflow:hidden;
            display:grid;grid-template-columns:1fr 280px;
            transition:border-color .2s,box-shadow .2s,transform .2s;
            cursor:pointer;

        .post-card-body{padding:24px 26px;display:flex;flex-direction:column;gap:12px;order:1;}

        .post-card-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
        .post-badge{
            padding:2px 10px;border-radius:100px;
            font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
        }
        .badge-tech{background:rgba(14,165,233,.12);color:#0ea5e9;border:1px solid rgba(14,165,233,.25);}
        .badge-tool{background:var(--accentlo);color:var(--accent);border:1px solid rgba(249,115,22,.25);}
        .badge-life{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);}
        .badge-dev{background:rgba(139,92,246,.12);color:#8b5cf6;border:1px solid rgba(139,92,246,.25);}
        .badge-default{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
        .post-date{font-size:12px;color:var(--muted);}
        .post-read-time{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}

        .post-card-title{
            font-family:'Noto Serif SC',serif;
            font-size:20px;font-weight:700;color:var(--text);
            line-height:1.4;transition:color .2s;
        }
        .post-card:hover .post-card-title{color:var(--accent);}

        .post-card-desc{font-size:14px;color:var(--text2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

        .post-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:8px;}
        .post-tag{
            padding:2px 9px;border-radius:6px;
            font-size:11px;font-weight:600;color:var(--muted);
            background:var(--surface2);border:1px solid var(--border);
            transition:all .15s;
        }
        .post-card:hover .post-tag{border-color:rgba(249,115,22,.2);color:var(--accent2);}

        .post-card-img{
            position:relative;overflow:hidden;
            background:var(--surface2);order:2;min-height:180px;
        }
        @media(max-width:700px){.post-card-img{min-height:180px;aspect-ratio:16/9;}}
        .post-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
        .post-card:hover .post-card-img img{transform:scale(1.06);}
        .post-card-img-overlay{
            position:absolute;inset:0;
            background:linear-gradient(to right,var(--surface) 0%,transparent 30%);
            pointer-events:none;
        }
        @media(max-width:700px){.post-card-img-overlay{background:linear-gradient(to top,var(--surface) 0%,transparent 40%);}}
        .post-card-no-img{
            display:flex;align-items:center;justify-content:center;
            font-size:48px;opacity:.3;
        }

        /* ── Pagination ── */
        .pagination{display:flex;justify-content:center;gap:8px;margin-top:40px;flex-wrap:wrap;}
        .page-btn{
            width:38px;height:38px;border-radius:10px;
            border:1px solid var(--border);background:var(--surface);
            color:var(--muted);font-size:13px;font-weight:600;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:all .18s;font-family:'Outfit',sans-serif;
        }
        .page-btn:hover{border-color:var(--accent);color:var(--accent);}
        .page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
        .page-btn:disabled{opacity:.35;cursor:not-allowed;}

        /* ── Empty state ── */
        .empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
        .empty-state svg{opacity:.2;margin-bottom:16px;}
        .empty-state p{font-size:15px;}

        /* ── Footer ── */
        footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:26px 20px;transition:border-color .3s;}
        .footer-inner{max-width:1160px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
        .footer-copy{font-size:13px;color:var(--muted);}
        .footer-links{display:flex;gap:4px;flex-wrap:wrap;}
        .footer-links a{font-size:13px;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:color .2s,background .2s;}
        .footer-links a:hover{color:var(--text);background:var(--border);}

        @keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
        .fade-in{animation:up .45s ease both;}
    </style>

<script>
document.getElementById('y').textContent = new Date().getFullYear();

// ══ i18n ══════════════════════════════════════════════════════════════
const I18N = {
    zh:{ nav_home:'首页', nav_blog:'博客', nav_help:'帮助', nav_about:'关于', nav_privacy:'隐私政策',
         blog_title:'BLOG', blog_sub:'记录技术探索，分享工具心得，留存每一次思考的痕迹。',
         stat_posts:'篇文章', stat_cats:'个分类', stat_tags:'个标签',
         cat_all:'全部', cat_tech:'技术', cat_tool:'工具', cat_dev:'开发', cat_life:'生活',
         search_ph:'搜索文章…', read_more:'阅读全文', min_read:'分钟阅读',
         no_result:'没有找到相关文章', page_title:'博客 · QuickToolLab',
    },
    en:{ nav_home:'Home', nav_blog:'Blog', nav_help:'Help', nav_about:'About', nav_privacy:'Privacy',
         blog_title:'BLOG', blog_sub:'Tech explorations, tool guides, and developer thoughts.',
         stat_posts:'Articles', stat_cats:'Categories', stat_tags:'Tags',
         cat_all:'All', cat_tech:'Tech', cat_tool:'Tools', cat_dev:'Dev', cat_life:'Life',
         search_ph:'Search articles…', read_more:'Read more', min_read:'min read',
         no_result:'No articles found', page_title:'Blog · QuickToolLab',
    },
    ja:{ nav_home:'ホーム', nav_blog:'ブログ', nav_help:'ヘルプ', nav_about:'About', nav_privacy:'プライバシー',
         blog_title:'BLOG', blog_sub:'技術探求、ツールガイド、開発者の思考を記録します。',
         stat_posts:'記事', stat_cats:'カテゴリ', stat_tags:'タグ',
         cat_all:'全て', cat_tech:'技術', cat_tool:'ツール', cat_dev:'開発', cat_life:'ライフ',
         search_ph:'記事を検索…', read_more:'続きを読む', min_read:'分で読める',
         no_result:'記事が見つかりません', page_title:'ブログ · QuickToolLab',
    },
};

// ══ Blog posts data ════════════════════════════════════════════════════
let POSTS = [];

const PAGE_SIZE = 5;
let currentCat = 'all';
let currentPage = 1;
let searchQuery = '';
let lang = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');
let theme = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

async function loadData() {
    try {
        const res = await fetch('/data/posts.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        POSTS = Array.isArray(data) ? data : [];
    } catch (err) {
        POSTS = [];
        console.error('Failed to load blog posts data:', err);
    }
}

// ══ Filter & render ════════════════════════════════════════════════════
function getFiltered() {
    return POSTS.filter(p => {
        const matchCat = currentCat === 'all' || p.cat === currentCat;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q ||
            (p.title[lang] || p.title.zh).toLowerCase().includes(q) ||
            (p.desc[lang]  || p.desc.zh ).toLowerCase().includes(q)  ||
            p.tags.some(t => t.toLowerCase().includes(q));
        return matchCat && matchSearch;
    });
}

function badgeClass(badge) {
    return {tech:'badge-tech',tool:'badge-tool',dev:'badge-dev',life:'badge-life'}[badge] || 'badge-default';
}

function renderPosts() {
    const t = I18N[lang];
    const filtered = getFiltered();
    const total    = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = 1;
    const slice = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
    const grid  = document.getElementById('posts-grid');

    if (!slice.length) {
        grid.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" display="block" style="margin:0 auto"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>${t.no_result}</p></div>`;
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('stat-total').textContent = POSTS.length;
        document.getElementById('stat-cats').textContent = [...new Set(POSTS.map(p => p.cat))].length;
        document.getElementById('stat-tags').textContent = [...new Set(POSTS.flatMap(p => p.tags || []))].length;
        return;
    }

    grid.innerHTML = slice.map((p, i) => {
        const title = p.title[lang] || p.title.zh;
        const desc  = p.desc[lang]  || p.desc.zh;
        const delay = i * 0.06;
        return `
        <article class="post-card" style="animation:up .5s ${delay}s ease both;opacity:0;" onclick="window.location.href='blog-post.html?id=${encodeURIComponent(p.id)}'">
            <div class="post-card-body">
                <div class="post-card-meta">
                    <span class="post-badge ${badgeClass(p.badge)}">${p.badge}</span>
                    <span class="post-date">📅 ${p.date}</span>
                    <span class="post-read-time">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        ${p.readTime} ${t.min_read}
                    </span>
                </div>
                <h2 class="post-card-title">${escHtml(title)}</h2>
                <p class="post-card-desc">${escHtml(desc)}</p>
                <div class="post-card-tags">
                    ${(p.tags || []).map(tag => `<span class="post-tag">#${escHtml(tag)}</span>`).join('')}
                </div>
            </div>
            ${p.image
                ? `<div class="post-card-img"><img src="${p.image}" alt="${escHtml(title)}" loading="lazy"><div class="post-card-img-overlay"></div></div>`
                : `<div class="post-card-img post-card-no-img">📝</div>`
            }
        </article>`;
    }).join('');

    renderPagination(totalPages);

    const allCats = [...new Set(POSTS.map(p => p.cat))];
    const allTags = [...new Set(POSTS.flatMap(p => p.tags || []))];
    document.getElementById('stat-total').textContent = POSTS.length;
    document.getElementById('stat-cats').textContent  = allCats.length;
    document.getElementById('stat-tags').textContent  = allTags.length;
}

function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i=1; i<=totalPages; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    pg.innerHTML = html;
}

function changePage(p) {
    currentPage = p;
    renderPosts();
    window.scrollTo({top:0,behavior:'smooth'});
}

// ══ Filter tabs ════════════════════════════════════════════════════════
document.getElementById('filter-tags').addEventListener('click', e => {
    const btn = e.target.closest('.filter-tag');
    if (!btn) return;
    document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    currentPage = 1;
    renderPosts();
});

// ══ Search ══════════════════════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    currentPage = 1;
    renderPosts();
});

// ══ i18n ══════════════════════════════════════════════════════════════
function applyLang(l) {
    lang = l; localStorage.setItem('pc_lang', l);
    document.documentElement.lang = l;
    const t = I18N[l];
    document.title = t.page_title;
    document.querySelectorAll('[data-i18n]').forEach(el => { const k=el.dataset.i18n; if(t[k]) el.textContent=t[k]; });
    const si = document.getElementById('search-input'); if(si) si.placeholder = t.search_ph;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang===l));
    renderPosts();
}
function applyTheme(t) {
    theme = t; localStorage.setItem('pc_theme', t);
    document.documentElement.setAttribute('data-theme', t);
}

document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));
document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme==='dark'?'light':'dark'));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => { if(!localStorage.getItem('pc_theme')) applyTheme(e.matches?'dark':'light'); });

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

document.addEventListener('DOMContentLoaded', () => {
    applyTheme(theme);
    loadData().then(() => {
        applyLang(lang);
    });
});
</script>
</body>
</html>
