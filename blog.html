    <style>
        :root {

            --accent2:#fb923c;
            --accentlo:rgba(249,115,22,.12);
            --green:#22c55e;
            --teal:#14b8a6;
        }
        [data-theme="dark"] {
            --bg:#0a0a10;
            --surface:#111118;
            --surface2:#18181f;
            --border:#222230;
            --text:#ededf5;
            --muted:#5a5a72;
        }
        [data-theme="light"] {
            --bg:#f2f2f7;
            --surface:#ffffff;
            --surface2:#e8e8f0;
            --border:#d8d8e8;
            --text:#16161f;
            --muted:#7a7a96;
        }
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        body {
            background:var(--bg);
            color:var(--text);
            font-family:'Outfit', sans-serif;
            line-height:1.6;
            min-height:100vh;
            transition:background .3s, color .3s;
        }
        [data-theme="dark"] body::before {
            content:'';
            position:fixed;
            inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events:none;
            z-index:0;
        }
        [data-theme="dark"] body::after {
            content:'';
            position:fixed;
            top:-240px;
            right:-140px;
            width:680px;
            height:680px;
            background:radial-gradient(circle, rgba(249,115,22,.08) 0%, transparent 62%);
            pointer-events:none;
            z-index:0;
        }
        header {
            position:sticky;
            top:0;
            z-index:100;
            border-bottom:1px solid var(--border);
            background:color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter:blur(18px);
        }
        .nav {
            max-width:1100px;
            margin:0 auto;
            min-height:58px;
            padding:10px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:14px;
            flex-wrap:wrap;
        }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .logo-mark {
            width:36px; height:36px; border-radius:10px;
            background:linear-gradient(135deg, #ea580c, #f97316);
            display:flex; align-items:center; justify-content:center;
            font-family:'Bebas Neue', sans-serif; font-size:19px; color:#fff;
        }
        .logo-name { font-family:'Bebas Neue', sans-serif; font-size:22px; letter-spacing:1.5px; color:var(--text); }

        .logo-sub { font-size:11px; color:var(--muted); margin-top:-2px; }
        .nav-links { display:flex; align-items:center; gap:4px 8px; flex-wrap:wrap; }
        .nav-links a {
            font-size:12.5px; font-weight:600;
            color:var(--muted); text-decoration:none;
            padding:6px 10px; border-radius:8px; transition:.18s;
        }
        .nav-links a:hover, .nav-links a.active { color:var(--accent); background:var(--accentlo); }
        .nav-right { display:flex; align-items:center; gap:6px; }
        .lang-sw {
            display:flex; gap:2px; padding:3px;
            border-radius:10px; border:1px solid var(--border);
            background:var(--surface2);
        }
        .lang-btn {
            padding:4px 9px; border:none; border-radius:7px;
            background:transparent; color:var(--muted);
            font-size:12px; font-weight:600; cursor:pointer;
            font-family:'Outfit', sans-serif;
        }
        .lang-btn.active { background:var(--accent); color:#fff; }
        .theme-btn {
            width:36px; height:36px; border-radius:10px;
            border:1px solid var(--border); background:var(--surface2);
            color:var(--muted); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .theme-btn:hover { color:var(--accent); border-color:var(--accent); }

        [data-theme="light"] .icon-moon { display:none; }

            z-index:1;

            margin-bottom:34px;

            grid-template-columns:1.2fr .8fr;
            gap:18px;

            background:var(--surface);
            border:1px solid var(--border);
            border-radius:22px;
            overflow:hidden;

        .hero-card {

        .metric-value {

        .search-wrap {
            min-width:260px;
            flex:1;
            max-width:360px;
        }
        .search {
            width:100%;
            border:1px solid var(--border);
            background:var(--surface);
            color:var(--text);

        .filter-row {

            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));

        .post-card {

            background:var(--surface);
            border:1px solid var(--border);

            overflow:hidden;
            text-decoration:none;

        .post-card:hover {
            transform:translateY(-3px);
            border-color:rgba(249,115,22,.32);
            background:var(--surface2);
        }
        .post-cover {
            height:170px;
            border-bottom:1px solid var(--border);
            position:relative;
            overflow:hidden;

            content:'';

            border-radius:999px;

            color:#fff;

            font-weight:700;

            text-transform:uppercase;
            backdrop-filter:blur(10px);

        .post-meta {

        .post-excerpt {

            padding:22px;

        }

<script src="/blog-posts.js"></script>
<script>
document.getElementById('y').textContent = new Date().getFullYear();

const I18N = {
    zh: {
        brand_sub: '综合在线工具站',
        nav_home: '首页',
        nav_blog: '博客',
        nav_help: '帮助中心',
        nav_about: '关于',
        nav_privacy: '隐私政策',
        eyebrow: 'Blog Notes',
        hero_title: '博客文章与站点更新',
        hero_sub: '这里集中记录 Astro 模板接入、文章管理、工具站内容设计和站点迭代日志，作为 QuickToolLab 的内容补充区。',
        metric_label: '已发布文章',
        metric_copy: '内容结构参考 Astro 静态博客模板，但继续保持当前站点的纯静态部署方式，方便后续逐步扩展。',
        section_title: '最新文章',
        search_placeholder: '搜索文章标题或摘要',
        empty: '没有匹配的文章，请换个关键词试试。',
        all: '全部',
        read_time: '阅读',
        open_post: '阅读全文'
    },
    en: {
        brand_sub: 'All-in-one tool hub',
        nav_home: 'Home',
        nav_blog: 'Blog',
        nav_help: 'Help',
        nav_about: 'About',
        nav_privacy: 'Privacy',
        eyebrow: 'Blog Notes',
        hero_title: 'Blog posts and site updates',
        hero_sub: 'This section collects notes on Astro-inspired blog structure, content workflow, and QuickToolLab site iterations.',
        metric_label: 'Published Posts',
        metric_copy: 'The structure is inspired by an Astro blog template while keeping the current deployment flow static and simple.',
        section_title: 'Latest Posts',
        search_placeholder: 'Search title or excerpt',
        empty: 'No matching posts. Try another keyword.',
        all: 'All',
        read_time: 'Read',
        open_post: 'Read more'
    },
    ja: {
        brand_sub: '総合オンラインツールサイト',
        nav_home: 'ホーム',
        nav_blog: 'ブログ',
        nav_help: 'ヘルプ',
        nav_about: '概要',
        nav_privacy: 'プライバシー',
        eyebrow: 'Blog Notes',
        hero_title: 'ブログ記事とサイト更新',
        hero_sub: 'Astro 風のブログ構造、運用メモ、QuickToolLab の改善内容をまとめるためのコンテンツエリアです。',
        metric_label: '公開記事数',
        metric_copy: 'Astro テンプレートの発想を参考にしつつ、現在の静的デプロイ方式をそのまま維持しています。',
        section_title: '最新記事',
        search_placeholder: 'タイトルや概要を検索',
        empty: '一致する記事がありません。別のキーワードを試してください。',
        all: 'すべて',
        read_time: '読む',
        open_post: '続きを読む'
    }
};

const POSTS = Array.isArray(window.BLOG_POSTS) ? window.BLOG_POSTS.slice() : [];
let lang = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');
let theme = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
let activeCategory = 'all';
let searchKeyword = '';

function pick(field) {
    if (field == null) return '';
    if (typeof field === 'string') return field;
    return field[lang] || field.zh || field.en || field.ja || '';
}

function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value || '';
    return div.innerHTML;
}

function categories() {
    return [...new Set(POSTS.map(post => pick(post.category)).filter(Boolean))];
}

function filteredPosts() {
    return POSTS.filter(post => {
        const title = pick(post.title).toLowerCase();
        const excerpt = pick(post.excerpt).toLowerCase();
        const category = pick(post.category);
        const hitCategory = activeCategory === 'all' || category === activeCategory;
        const hitSearch = !searchKeyword || title.includes(searchKeyword) || excerpt.includes(searchKeyword);
        return hitCategory && hitSearch;
    });
}

function renderFilters() {
    const dict = I18N[lang];
    const host = document.getElementById('filter-row');
    const items = [dict.all, ...categories()];
    host.innerHTML = items.map(item => {
        const value = item === dict.all ? 'all' : item;
        const active = value === activeCategory ? ' active' : '';
        return `<button class="filter-btn${active}" data-filter="${escapeHtml(value)}">${escapeHtml(item)}</button>`;
    }).join('');
    host.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            activeCategory = btn.dataset.filter;
            renderFilters();
            renderPosts();
        });
    });
}

function renderPosts() {
    const dict = I18N[lang];
    const host = document.getElementById('post-grid');
    const empty = document.getElementById('empty-state');
    const list = filteredPosts();
    document.getElementById('post-count').textContent = String(POSTS.length);
    if (!list.length) {
        host.innerHTML = '';
        empty.hidden = false;
        return;
    }
    empty.hidden = true;
    host.innerHTML = list.map(post => {
        const tags = (post.tags && (post.tags[lang] || post.tags.zh || post.tags.en || post.tags.ja || [])).slice(0, 3);
        return `
            <a class="post-card" href="/blog-article.html?id=${encodeURIComponent(post.id)}">
                <div class="post-cover" style="background:${post.cover}">
                    <span class="post-cover-label">${escapeHtml(pick(post.category))}</span>
                </div>
                <div class="post-body">
                    <div class="post-meta">
                        <span>${escapeHtml(post.date)}</span>
                        <span>${escapeHtml(dict.read_time)} · ${escapeHtml(post.readTime)}</span>
                    </div>
                    <h3 class="post-title">${escapeHtml(pick(post.title))}</h3>
                    <p class="post-excerpt">${escapeHtml(pick(post.excerpt))}</p>
                    <div class="post-tags">${tags.map(tag => `<span>${escapeHtml(tag)}</span>`).join('')}</div>
                </div>
            </a>
        `;
    }).join('');
}

function applyLang(nextLang) {
    lang = nextLang;
    localStorage.setItem('pc_lang', nextLang);
    document.documentElement.lang = nextLang;
    const dict = I18N[nextLang];
    document.title = nextLang === 'zh' ? '博客文章 · QuickToolLab' : nextLang === 'ja' ? 'ブログ記事 · QuickToolLab' : 'Blog Posts · QuickToolLab';
    document.querySelector('meta[name="description"]').setAttribute('content', pick({
        zh: 'QuickToolLab 博客文章页：记录 Astro 模板接入、博客内容管理、主题模式切换和工具站内容实践。',
        en: 'QuickToolLab blog posts about Astro-inspired structure, content workflow, theme switching, and site updates.',
        ja: 'QuickToolLab のブログ記事ページ。Astro 風の構成、運用メモ、テーマ切替、サイト更新をまとめています。'
    }));
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (dict[key] != null) el.textContent = dict[key];
    });
    document.getElementById('search-input').placeholder = dict.search_placeholder;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === nextLang));
    renderFilters();
    renderPosts();
}

function applyTheme(nextTheme) {
    theme = nextTheme;
    localStorage.setItem('pc_theme', nextTheme);
    document.documentElement.setAttribute('data-theme', nextTheme);
}

document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));
document.getElementById('search-input').addEventListener('input', event => {
    searchKeyword = event.target.value.trim().toLowerCase();
    renderPosts();
});

applyTheme(theme);
applyLang(lang);
</script>
</body>
</html>
