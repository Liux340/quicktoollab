    <style>
        /* ── Hero Banner ── */
        .blog-hero{
            position:relative;overflow:hidden;
            background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
            border-bottom:1px solid var(--border);
            padding:60px 20px 50px;
            text-align:center;
        }
        .blog-hero::before{
            content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,.12),transparent 65%);
            pointer-events:none;
        }
        .blog-hero::after{
            content:'BLOG';position:absolute;
            font-family:'Bebas Neue',sans-serif;font-size:220px;font-weight:700;
            color:var(--text);opacity:.025;letter-spacing:8px;
            top:50%;left:50%;transform:translate(-50%,-50%);
            pointer-events:none;white-space:nowrap;
        }
        .blog-hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto;}
        .blog-hero-badge{
            display:inline-flex;align-items:center;gap:6px;
            padding:4px 14px;border-radius:100px;
            background:var(--accentlo);border:1px solid rgba(249,115,22,.3);
            font-size:12px;font-weight:700;color:var(--accent);
            letter-spacing:.5px;text-transform:uppercase;margin-bottom:20px;
        }
        .blog-hero h1{
            font-family:'Bebas Neue',sans-serif;
            font-size:clamp(52px,9vw,88px);letter-spacing:4px;line-height:1;
            background:linear-gradient(120deg,var(--text) 35%,var(--accent));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            margin-bottom:14px;
        }
        .blog-hero p{color:var(--muted);font-size:15px;max-width:420px;margin:0 auto 28px;}
        .blog-hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;}
        .hero-stat{text-align:center;}
        .hero-stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--accent);}
        .hero-stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

        /* ── Main layout ── */
        main{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:40px 20px 100px;}

        /* ── Filter & Search ── */
        .filter-bar{
            display:flex;align-items:center;justify-content:space-between;
            gap:12px;flex-wrap:wrap;margin-bottom:28px;
        }
        .filter-tags{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
        .filter-tag{
            padding:5px 14px;border-radius:100px;
            border:1px solid var(--border);background:transparent;
            color:var(--muted);font-size:12.5px;font-weight:600;
            cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif;
        }
        .filter-tag:hover{border-color:var(--accent2);color:var(--accent2);}
        .filter-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;}
        .search-wrap{position:relative;flex-shrink:0;}
        .search-wrap input{
            width:220px;height:36px;padding:0 36px 0 12px;
            border-radius:10px;border:1px solid var(--border);
            background:var(--surface);color:var(--text);
            font-size:13px;font-family:'Outfit',sans-serif;
            outline:none;transition:border-color .2s,box-shadow .2s;
        }
        .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,.12);}
        .search-wrap input::placeholder{color:var(--muted);}
        .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}

        /* ── Post Card ── */
        .posts-grid{display:flex;flex-direction:column;gap:20px;}

        .post-card{
            background:var(--surface);border:1px solid var(--border);
            border-radius:18px;overflow:hidden;
            display:grid;grid-template-columns:1fr 280px;
            transition:border-color .2s,box-shadow .2s,transform .2s;
            cursor:pointer;
        }
        .post-card:hover{border-color:var(--accent);box-shadow:0 8px 32px rgba(249,115,22,.12);transform:translateY(-2px);}
        @media(max-width:700px){.post-card{grid-template-columns:1fr;}}

        .post-card-body{padding:24px 26px;display:flex;flex-direction:column;gap:12px;order:1;}

        .post-card-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
        .post-badge{
            padding:2px 10px;border-radius:100px;
            font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
        }
        .badge-tech{background:rgba(14,165,233,.12);color:#0ea5e9;border:1px solid rgba(14,165,233,.25);}
        .badge-tool{background:var(--accentlo);color:var(--accent);border:1px solid rgba(249,115,22,.25);}
        .badge-life{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25);}
        .badge-dev{background:rgba(139,92,246,.12);color:#8b5cf6;border:1px solid rgba(139,92,246,.25);}
        .badge-default{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
        .post-date{font-size:12px;color:var(--muted);}
        .post-read-time{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}

        .post-card-title{
            font-family:'Noto Serif SC',serif;
            font-size:20px;font-weight:700;color:var(--text);
            line-height:1.4;transition:color .2s;
        }
        .post-card:hover .post-card-title{color:var(--accent);}

        .post-card-desc{font-size:14px;color:var(--text2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

        .post-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:8px;}
        .post-tag{
            padding:2px 9px;border-radius:6px;
            font-size:11px;font-weight:600;color:var(--muted);
            background:var(--surface2);border:1px solid var(--border);
            transition:all .15s;
        }
        .post-card:hover .post-tag{border-color:rgba(249,115,22,.2);color:var(--accent2);}

        .post-card-img{
            position:relative;overflow:hidden;
            background:var(--surface2);order:2;min-height:180px;
        }
        @media(max-width:700px){.post-card-img{min-height:180px;aspect-ratio:16/9;}}
        .post-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
        .post-card:hover .post-card-img img{transform:scale(1.06);}
        .post-card-img-overlay{
            position:absolute;inset:0;
            background:linear-gradient(to right,var(--surface) 0%,transparent 30%);
            pointer-events:none;
        }
        @media(max-width:700px){.post-card-img-overlay{background:linear-gradient(to top,var(--surface) 0%,transparent 40%);}}
        .post-card-no-img{
            display:flex;align-items:center;justify-content:center;
            font-size:48px;opacity:.3;
        }

        /* ── Pagination ── */
        .pagination{display:flex;justify-content:center;gap:8px;margin-top:40px;flex-wrap:wrap;}
        .page-btn{
            width:38px;height:38px;border-radius:10px;
            border:1px solid var(--border);background:var(--surface);
            color:var(--muted);font-size:13px;font-weight:600;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:all .18s;font-family:'Outfit',sans-serif;
        }
        .page-btn:hover{border-color:var(--accent);color:var(--accent);}
        .page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
        .page-btn:disabled{opacity:.35;cursor:not-allowed;}

        /* ── Empty state ── */
        .empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
        .empty-state svg{opacity:.2;margin-bottom:16px;}
        .empty-state p{font-size:15px;}

        /* ── Utilities ── */
        .fade-in{animation:up .45s ease both;}
    </style>

</head>

<script>
// ══ Blog-specific i18n keys (not in shared i18n.js) ════════════════════════
var BLOG_I18N = {
    zh: {
        stat_posts: '篇文章', stat_cats: '个分类', stat_tags: '个标签',
        cat_all: '全部', cat_tech: '技术', cat_tool: '工具', cat_dev: '开发', cat_life: '生活',
        search_ph: '搜索文章…', min_read: '分钟阅读', no_result: '没有找到相关文章',
    },
    en: {
        stat_posts: 'Articles', stat_cats: 'Categories', stat_tags: 'Tags',
        cat_all: 'All', cat_tech: 'Tech', cat_tool: 'Tools', cat_dev: 'Dev', cat_life: 'Life',
        search_ph: 'Search articles…', min_read: 'min read', no_result: 'No articles found',
    },
    ja: {
        stat_posts: '記事', stat_cats: 'カテゴリ', stat_tags: 'タグ',
        cat_all: '全て', cat_tech: '技術', cat_tool: 'ツール', cat_dev: '開発', cat_life: 'ライフ',
        search_ph: '記事を検索…', min_read: '分で読める', no_result: '記事が見つかりません',
    },
};

// ══ Blog posts data ════════════════════════════════════════════════════
var POSTS = [];
var PAGE_SIZE = 5;
var currentCat = 'all';
var currentPage = 1;
var searchQuery = '';

function bt(key) {
    return (BLOG_I18N[lang] && BLOG_I18N[lang][key]) || (I18N[lang] && I18N[lang][key]) || key;
}

async function loadData() {
    try {
        var res = await fetch('/content/blog/index.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        POSTS = Array.isArray(data) ? data : [];
    } catch (err) {
        POSTS = [];
        console.error('Failed to load blog posts data:', err);
    }
}

// ══ Filter & render ════════════════════════════════════════════════════
function getFiltered() {
    return POSTS.filter(function(p) {
        var matchCat = currentCat === 'all' || p.cat === currentCat;
        var q = searchQuery.toLowerCase();
        var matchSearch = !q ||
            (p.title[lang] || p.title.zh).toLowerCase().includes(q) ||
            (p.desc[lang]  || p.desc.zh ).toLowerCase().includes(q)  ||
            p.tags.some(function(t) { return t.toLowerCase().includes(q); });
        return matchCat && matchSearch;
    });
}

function badgeClass(badge) {
    return {tech:'badge-tech',tool:'badge-tool',dev:'badge-dev',life:'badge-life'}[badge] || 'badge-default';
}

function renderPosts() {
    var filtered = getFiltered();
    var total    = filtered.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = 1;
    var slice = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
    var grid  = document.getElementById('posts-grid');

    if (!slice.length) {
        grid.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" display="block" style="margin:0 auto"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>' + escapeHtml(bt('no_result')) + '</p></div>';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('stat-total').textContent = POSTS.length;
        document.getElementById('stat-cats').textContent = Array.from(new Set(POSTS.map(function(p){return p.cat;}))).length;
        document.getElementById('stat-tags').textContent = Array.from(new Set(POSTS.flatMap(function(p){return p.tags||[];}))).length;
        return;
    }

    grid.innerHTML = slice.map(function(p, i) {
        var title = p.title[lang] || p.title.zh;
        var desc  = p.desc[lang]  || p.desc.zh;
        var delay = i * 0.06;
        return '<article class="post-card" style="animation:up .5s ' + delay + 's ease both;opacity:0;" onclick="window.location.href=\'blog-post.html?id=' + encodeURIComponent(p.id) + '\'">' +
            '<div class="post-card-body">' +
                '<div class="post-card-meta">' +
                    '<span class="post-badge ' + badgeClass(p.badge) + '">' + p.badge + '</span>' +
                    '<span class="post-date">📅 ' + p.date + '</span>' +
                    '<span class="post-read-time">' +
                        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ' +
                        p.readTime + ' ' + bt('min_read') +
                    '</span>' +
                '</div>' +
                '<h2 class="post-card-title">' + escapeHtml(title) + '</h2>' +
                '<p class="post-card-desc">' + escapeHtml(desc) + '</p>' +
                '<div class="post-card-tags">' +
                    (p.tags || []).map(function(tag) { return '<span class="post-tag">#' + escapeHtml(tag) + '</span>'; }).join('') +
                '</div>' +
            '</div>' +
            (p.image
                ? '<div class="post-card-img"><img src="' + p.image + '" alt="' + escapeHtml(title) + '" loading="lazy"><div class="post-card-img-overlay"></div></div>'
                : '<div class="post-card-img post-card-no-img">📝</div>'
            ) +
        '</article>';
    }).join('');

    renderPagination(totalPages);

    var allCats = Array.from(new Set(POSTS.map(function(p){return p.cat;})));
    var allTags = Array.from(new Set(POSTS.flatMap(function(p){return p.tags||[];})));
    document.getElementById('stat-total').textContent = POSTS.length;
    document.getElementById('stat-cats').textContent  = allCats.length;
    document.getElementById('stat-tags').textContent  = allTags.length;
}

function renderPagination(totalPages) {
    var pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    var html = '<button class="page-btn" onclick="changePage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>&lsaquo;</button>';
    for (var i=1; i<=totalPages; i++) {
        html += '<button class="page-btn ' + (i===currentPage?'active':'') + '" onclick="changePage(' + i + ')">' + i + '</button>';
    }
    html += '<button class="page-btn" onclick="changePage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>&rsaquo;</button>';
    pg.innerHTML = html;
}

function changePage(p) {
    currentPage = p;
    renderPosts();
    window.scrollTo({top:0,behavior:'smooth'});
}

// ══ Filter tabs ════════════════════════════════════════════════════════
document.getElementById('filter-tags').addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-tag');
    if (!btn) return;
    document.querySelectorAll('.filter-tag').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    currentPage = 1;
    renderPosts();
});

// ══ Search ══════════════════════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', function(e) {
    searchQuery = e.target.value.trim();
    currentPage = 1;
    renderPosts();
});

// ══ Called by common.js when language changes ═══════════════════════════
function onLangChange() {
    document.title = I18N[lang] ? I18N[lang].blog_title : 'Blog · QuickToolLab';

    // Apply shared i18n, then override with blog-specific keys
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var k = el.dataset.i18n;
        var v = (BLOG_I18N[lang] && BLOG_I18N[lang][k]) || (I18N[lang] && I18N[lang][k]);
        if (v) el.textContent = v;
    });

    // Search placeholder (data-i18n-placeholder is not handled by common.js)
    var si = document.getElementById('search-input');
    if (si) si.placeholder = bt('search_ph');

    renderPosts();
}

// ══ Init ════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
    loadData().then(function() {
        onLangChange();
    });
});
</script>
