<!DOCTYPE html>
<html lang="zh">
<head>
    <title>帮助中心 · QuickToolLab</title>
    <meta charset="UTF-8">
    <script>
        (function(){
            var t=localStorage.getItem('pc_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
            var l=localStorage.getItem('pc_lang')||(navigator.language.startsWith('ja')?'ja':navigator.language.startsWith('zh')?'zh':'en');
            document.documentElement.setAttribute('data-theme',t);
            document.documentElement.lang=l;
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QuickToolLab 帮助中心：工具介绍、使用方法与实用科普。覆盖 PixCrush、格式转换、前端开发、运维网络、安全文档等常用工具。">
    <link rel="canonical" href="https://quicktoolab.com/help.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a10'/><path d='M8 10h6l4 6 6-6v14H8V10z' fill='none' stroke='%23f97316' stroke-width='2' stroke-linejoin='round'/><circle cx='11' cy='22' r='2' fill='%2322c55e'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#f97316; --accent2:#fb923c; --accentlo:rgba(249,115,22,.12); --teal:#14b8a6; }
        [data-theme="dark"]  { --bg:#0a0a10; --surface:#111118; --surface2:#18181f; --border:#222230; --text:#ededf5; --muted:#5a5a72; }
        [data-theme="light"] { --bg:#f2f2f7; --surface:#ffffff; --surface2:#e8e8f0; --border:#d8d8e8; --text:#16161f; --muted:#7a7a96; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;line-height:1.6;min-height:100vh;transition:background .3s,color .3s}
        [data-theme="dark"] body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
        [data-theme="dark"] body::after{content:'';position:fixed;top:-300px;left:50%;transform:translateX(-50%);width:900px;height:700px;background:radial-gradient(ellipse,rgba(249,115,22,.06) 0%,transparent 65%);pointer-events:none;z-index:0}

        header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(18px)}
        .nav{max-width:1040px;margin:0 auto;padding:0 20px;min-height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
        .logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#ea580c,#f97316);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff}
        .logo-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
        .logo-name span{color:var(--accent)}
        .logo-sub{font-size:10px;font-weight:600;color:var(--muted);margin-top:-2px}
        .nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
        .nav-links{display:flex;gap:2px;flex-wrap:wrap}
        .nav-link{padding:5px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .2s,background .2s}
        .nav-link:hover{color:var(--text);background:var(--border)}
        .lang-sw{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px}
        .lang-btn{padding:4px 9px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif}
        .lang-btn.active{background:var(--accent);color:#fff}
        .lang-btn:not(.active):hover{color:var(--text)}
        .theme-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .theme-btn:hover{color:var(--accent);border-color:var(--accent)}
        [data-theme="dark"] .icon-sun{display:none}
        [data-theme="dark"] .icon-moon{display:block}
        [data-theme="light"] .icon-sun{display:block}
        [data-theme="light"] .icon-moon{display:none}

        main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:58px 20px 100px}
        .eyebrow{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;border:1px solid rgba(249,115,22,.3);background:var(--accentlo);font-size:12px;font-weight:600;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:18px}
        .title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,70px);letter-spacing:3px;line-height:1;background:linear-gradient(120deg,var(--text) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
        .lead{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:36px;max-width:720px}

        .crumb{
            display:inline-flex;
            gap:8px;
            align-items:center;
            border:1px solid var(--border);
            background:var(--surface);
            border-radius:8px;
            padding:6px 10px;
            margin-bottom:18px;
            font-size:12px;
            color:var(--muted);
        }
        .crumb a{color:var(--muted);text-decoration:none}
        .crumb a:hover{color:var(--text)}

        .section-head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(20,184,166,.2)}
        .section-head h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text)}

        .help-shell{display:flex;flex-direction:column;gap:14px}

        .help-list{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }
        @media(max-width:760px){.help-list{grid-template-columns:1fr}}
        .help-item{
            width:100%;
            text-align:center;
            border:1px solid var(--border);
            background:color-mix(in srgb, var(--surface2) 88%, white);
            color:var(--muted);
            border-radius:10px;
            padding:12px 14px;
            cursor:pointer;
            font-size:13px;
            line-height:1.45;
            transition:border-color .2s, color .2s, background .2s;
            font-family:inherit;
        }
        .help-item:hover{color:var(--text);border-color:var(--accent2)}
        .help-item.active{
            color:var(--text);
            border-color:var(--accent);
            background:var(--accentlo);
        }
        .help-item small{
            display:block;
            margin-top:6px;
            font-size:11px;
            color:var(--muted);
        }

        .help-detail{
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:14px;
            padding:18px 18px 16px;
        }
        .help-meta{
            font-size:11px;
            letter-spacing:.06em;
            text-transform:uppercase;
            color:var(--accent2);
            margin-bottom:8px;
        }
        .help-detail h3{
            font-size:22px;
            line-height:1.35;
            margin-bottom:14px;
        }
        .line{font-size:14px;color:var(--muted);line-height:1.9;margin:0 0 10px}
        .line b{color:var(--accent2)}
        footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:26px 20px}
        .footer-inner{max-width:1040px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .footer-copy{font-size:13px;color:var(--muted)}
        .footer-links{display:flex;gap:4px;flex-wrap:wrap}
        .footer-links a{font-size:13px;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:color .2s,background .2s}
        .footer-links a:hover{color:var(--text);background:var(--border)}
    </style>
</head>
<body>
<header>
    <div class="nav">
        <a href="/" class="logo">
            <div class="logo-mark">Q</div>
            <div>
                <div class="logo-name">QUICK<span>TOOL</span>LAB</div>
                <div class="logo-sub" data-i18n="brand_sub">综合在线工具站</div>
            </div>
        </a>
        <div class="nav-right">
            <div class="nav-links">
                <a href="/" class="nav-link" data-i18n="nav_home">首页</a>
                <a href="/about.html" class="nav-link" data-i18n="nav_about">关于</a>
                <a href="/privacy.html" class="nav-link" data-i18n="nav_privacy">隐私政策</a>
            </div>
            <div class="lang-sw">
                <button type="button" class="lang-btn" data-lang="zh">中文</button>
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ja">日本語</button>
            </div>
            <button type="button" class="theme-btn" id="theme-btn" aria-label="Theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="eyebrow" data-i18n="eyebrow">帮助中心</div>
    <h1 class="title" data-i18n="page_title">HELP<br>CENTER</h1>
    <p class="lead" data-i18n="page_lead">这里提供工具介绍、使用方法与实用科普。每篇都是可直接上手的短文，覆盖首页最常用的工具类型和代表工具。</p>

    <div class="crumb">
        <a href="/" data-i18n="nav_home">首页</a>
        <span>/</span>
        <span data-i18n="nav_help">帮助中心</span>
    </div>

    <div class="section-head"><span class="dot"></span><h2 data-i18n="article_list_title">文章列表</h2></div>
    <section class="help-shell">
        <div class="help-list" id="help-list" aria-label="Article list"></div>
    </section>
</main>

<footer>
    <div class="footer-inner">
        <span class="footer-copy">© <span id="cy"></span> QuickToolLab</span>
        <div class="footer-links">
            <a href="/" data-i18n="nav_home">首页</a>
            <a href="/help.html" data-i18n="nav_help">帮助中心</a>
            <a href="/about.html" data-i18n="nav_about">关于</a>
            <a href="/privacy.html" data-i18n="nav_privacy">隐私政策</a>
        </div>
    </div>
</footer>

<script src="/help-articles.js"></script>
<script>
document.getElementById('cy').textContent = new Date().getFullYear();

const I18N = {
    zh:{
        brand_sub:'综合在线工具站',
        nav_home:'首页', nav_help:'帮助中心', nav_about:'关于', nav_privacy:'隐私政策',
        eyebrow:'帮助中心',
        page_title:'HELP<br>CENTER',
        page_lead:'这里提供工具介绍、使用方法与实用科普。每篇都是可直接上手的短文，覆盖首页最常用的工具类型和代表工具。',
        article_list_title:'文章列表',
        page_title_tag:'帮助中心 · QuickToolLab'
    },
    en:{
        brand_sub:'All-in-one tool hub',
        nav_home:'Home', nav_help:'Help', nav_about:'About', nav_privacy:'Privacy',
        eyebrow:'Help Center',
        page_title:'HELP<br>CENTER',
        page_lead:'Practical notes for common tools: introductions, quick usage steps, and lightweight concepts.',
        article_list_title:'Articles',
        page_title_tag:'Help Center · QuickToolLab'
    },
    ja:{
        brand_sub:'総合オンラインツール',
        nav_home:'ホーム', nav_help:'ヘルプ', nav_about:'About', nav_privacy:'プライバシー',
        eyebrow:'ヘルプセンター',
        page_title:'HELP<br>CENTER',
        page_lead:'よく使うツールの紹介・使い方・基礎知識を短い記事でまとめています。',
        article_list_title:'記事一覧',
        page_title_tag:'ヘルプセンター · QuickToolLab'
    }
};

let lang = localStorage.getItem('pc_lang') || (navigator.language.startsWith('ja') ? 'ja' : navigator.language.startsWith('zh') ? 'zh' : 'en');
let theme = localStorage.getItem('pc_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
const ARTICLES = window.HELP_ARTICLES || [];

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function localizeField(v) {
    if (v == null) return '';
    if (typeof v === 'string') return v;
    return v[lang] || v.zh || v.en || v.ja || '';
}

function renderArticleList() {
    const host = document.getElementById('help-list');
    host.innerHTML = ARTICLES.map((a) => `
        <a class="help-item" href="/help-article.html?id=${encodeURIComponent(a.id)}">
            ${escapeHtml(localizeField(a.title))}
            <small>${escapeHtml(localizeField(a.cat))}</small>
        </a>
    `).join('');
}

function applyLang(l) {
    lang = l;
    localStorage.setItem('pc_lang', l);
    document.documentElement.lang = l;
    const t = I18N[l];
    document.title = t.page_title_tag;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (t[k] != null) el.innerHTML = t[k];
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
    renderArticleList();
}
function applyTheme(t) {
    theme = t;
    localStorage.setItem('pc_theme', t);
    document.documentElement.setAttribute('data-theme', t);
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));
document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('pc_theme')) applyTheme(e.matches ? 'dark' : 'light');
});
applyTheme(theme);
applyLang(lang);
renderArticleList();
</script>
</body>
</html>
